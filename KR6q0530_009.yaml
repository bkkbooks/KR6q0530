body:
  text: 嗣法門人性深等編雜詠中復柯更生居士見嘲梅花百詠韻妙矣斯花隨方弗變香騎幽蘭色蓋輕霰非有非無如圭如瑱質不染塵機猶閃電聞既真聞見非假見真聞之聞不在中涯假見之見枝枝美麗或傍松塢或立水漪高兮下兮了無虧遺枯兮茂兮迥絶差池拓開煙雨突出瑰琦人間天上獨此一枝任詠任拈認即不是既難含藏縱教泄漏奇以千言會歸無一截我葛藤破君心結心結既破載馨載清滅尚無滅生更何生頭頭應現物物逢迎雪中之雪英中之英秋也能瘦春也能萌炎也能邃臘也能明明斯妙義弗一弗二溯厥未生無聞無視枝葉色香空乎大地竹徑山窗乃行乃寐妙在其中不可思議贈石竺禪師我觀上古人卻似一山木木固不足多可以支堂屋芳草遍芊芊徒然塞巖谷象季愚者多雖多不如獨堪羡避囂人立身高且淑非匠不低頭非梧不駐足針芥未相投逢人笑如哭寒谷數枝梅秋風半畝菊留月詠新詩倚杖招孤鶴何日登我山石床聊一宿偶成天地空無涯曾許誰為屋萬古舊溪山一時新草木景物不長存色聲易反覆抱膝望煙城閒情奔滿目豈若居山人深深樂巖谷放曠逗天機任運忘軀殼祖師禪不參夫子書不讀臥石枕雲根聽泉步山麓昨日採松花今朝煨蘆蔔童豎山中歸馴馴牧黃犢有客來扣扉爐內茶將熟借問下方人何日罷匍匐寄南泉鄭牧仲居士相率貧之隱古人亦弗如歸耕五柳晚辟穀赤松迂北海空垂釣南泉擅卜居休心誠治世見道自忘書木落秋風老壺高山色餘梅花猶寄語多種兩三且為密聲禪德壽大塊誰稱壽道高壽彌久千年彈指間所貴達本有物外一閒人清操四十九不追行腳債數椽安露肘年年桃李春色色溪山友茗碗逼人香蔬園用力厚凡聖相皆空是非何所受閉戶獨高吟日月任飛走屋角有蒼松為君傲白首送止止上人參方憶昔參方客不因山水遊瓢空吞日月衲破補春秋骨脊如梁豎眉端為道憂君今知老至始欲訪高儔遠度白雲嶺倦眠泛月舟雪峰毒鱉鼻黃蘗活藤頭針芥機須契師資法永流臨行一句語有待後相酬禪者應斯志況將書劍休慶雪檀陳居士母丘氏宜人七秩泰華何以尊群峰列下拜江淮何以廣漣漪納萬派仁壽越僧祗童真永不邁七十古來稀須彌投一芥不但天能覆且亦地能載我憶鶖子毋慧論聞皆驚與子成妙道秋月齊其明我憶孟氏母比玉片片精三遷成大器今古仰賢名況復太丘毋停杼育群英三從宗戚重萬卷荊叉傾見筍期凌漢催梅早調羹元愷迎慈訓燃藜續簪纓濟川舟楫猛柱國棟梁宏喬松未足老萱德翠為榮我欲登堂慶蟠桃猶未生和十華黃居士大雪紀賦韻江北遍奇絶未臘先飛雪野人雪裏歸頒毛珠滿襭更有峨嵋山凜凜寒六月瓊樹與圭峰老稚常獲瞥蹯趾盡潛蹤羽毛皆截舌有叟處其中成道空生滅于今何南來凌空飄屑屑莫欲閩中人肌骨知凍冽莫欲閩中山萬丈玉屏列天地本無偏氣候始復微花雨散春城無香亦競折積翠老漁樵篩風填巢穴饑雀不懼人馴階無可噎征夫馬不前擁牖足如鱉凍雲望不開烘日少點綴卿士久抱寒締袍誰多譏嬴得居山人蒙頭勝附熱一衲歲寒松片心煉後鐵策杖遍徘徊洪荒未剖剟皓爽奪晴光峨嵋殊無別飛絮動高吟得句自怡悅乙未六月從城中回蓮山薰風生別思丘壑減炎威病骨青山聳輕舟孤鳥飛居廛諳世味得水浣蘿衣百里炊無麥何山採有薇田疇今固稔庭徑尚皆菲久住梅容瘦新烹菜甲肥蠹書疲整理野鳥偶相依出入情奚似水雲跡弗微昆蟲家草莽釣父戀漁磯世外殊無著山中便息機壽余散耳居士母陳氏水南山水奇參天高嵂崒秀氣奪精華賢哲時間出穀城況比鄰人性近仙佛金屋不為榮圖書不足術木食勝玉漿屠釣韜幻質不但處衣冠閨闈亦守謐余門有陳母元季娛繞膝修己無投杼安貧慕懷橘明鏡老猶磨教子德可述春風臨初度月滿適今日山中柏與松蒼蒼葉正茁蹊邊桃與李灼灼華帶實萬物始發生瑞氣騰籌室誰知天地間化育功克濫余母亦何殊玄齡不可匹稱觴一杯水交慶儀必必九日巖遊步淡公方居士韻寺不在山山在寺無齒東山屐不費險窄溪橋得再來猿鳥追隨欣且悸秋風石上快談心古木庭前曲伸臂大地抹作微塵拈莖草轉為金身視獨立林泉慨古今優遊盡逐黃花媚峰頭峰下皆浮雲世出世間無實義法音震吼遍寰中畢竟何聞復何示微妙如香餌急向竿頭試誰住又誰寄白日多夢寐我來巖谷覓同參同鳥飛兮同樹企樹凋葉落露空山一片秋光空亦記和砍樹吟韻君勿效碌碌凡庸只守株涼人豈必滿林乎但得中心樹子在自然垂蔭遍道塗古人寧不契斯旨為播黃梅覆桑里斧斤一旦入山林音韻丁丁胡未已已焉哉從此無聞衆鳥聲遠望江山盡不平嬴得個中風景別東方未曉天先明通天度夏大地氣炎炎清涼生何處山深六月秋薰風發高樹蘆嶠雖未幽喬木青四顧禾黍逼人香出水蓮花吐竹簟日高眠松門閒獨步肺腑自然清不須想甘露況復諸文人盤桓朝與暮車馬競馳驅可憐不自寤到西巖晤赤庵張檀護歸自蜀中仍步來韻高山飛匹練放棹出林麓丘壑間丹青雲霞連起伏到寺笑相迎清風引松竹握手話崎嶇主人茶正熟萬里異山川行行誰敢獨數載履冰霜垂橐歸鄉曲林下日偷閒箭鋒樂相觸東山一片月須臾高照燭倦鳥何處栖庭前有喬木山居用石屋禪師韻數峰隱隱翠東西獨搆茆庵噉小溪楓葉驚霜紅上下梅花笑月白高低安心道者休文字博飯山翁帶水泥佛法任從都爛卻依然歸鳥屋頭啼本色住山本自由胸中何喜復何憂登山不見玄沙虎落草為鞭大溈牛露浥碧桃先破眼煙囊紫岫久埋頭一條歸路春風裡今古迢迢覓未休諸方挈挈逞機模冷淡家風孰肯圖流水澄清分曲筧飛嵐縹眇擁窮廚趁春攜侶尋茶萼添灶呼童拾桂枯受用奚慚自了漢謾誇懶瓚芋煨爐邪法熾然正法哀生埋頭角得便宜半龕煙雨微茫裡四壁藤蘿放曠時欲歇狂心猶有漏頓空慧性始無為渠儂豈是逸群漢往事何人不可追得意居山不在深孤標與世別浮沉霜嚴凜折千烽膏月朗印開古佛心草榻永消枕底夢寒鐘敲出劫初音相知何必頻相問一道圓通貫古今山房布置異人家有圃也培桃李花冒雨栽松伸翠蓋乘春種竹長新芽古錐出世寰中電先聖埋頭草裡蛇畢竟本來空索索六窗虛靜聽啼鴉心源湛寂映池塘求法求名兩著忙各立門庭爭楚漢誰修渾朴復周商無情偏解驚秋蚤含識也知泣露長我自居山得意後數株松柏不成行數武藤蘿織矮籬籬頭掛月半盈虧黃花不假秋光力翠竇還為泉眼窺得髓傳來槐國事枯形怪卻雪山時當陽偶爾抬眸鑑萬象森羅盡發機都來苦海弄浮漚若箇英雄放得休鳥亦知春心自悅花才聞雨臉先愁炎涼事幻憑遷變聲色路長任去留不盡濛濛煙藹裏誰家高擁幾層樓屏息諸緣與世孤一間草舍蓋圓顱長留鬚髮為山主遠喚獼猿作佛奴門外任從天雨霽庵中不見樹榮枯有人問我住庵意叉手無言聽鷓鴣從來山市不相侵幻質無端遁至深人語罕然聞谷口樵歌每自到庵心門環流水春初漲月掛空山曉不沉遙憶餐松移舍者孤風凜凜振當今草鞮脫向钁頭邊出入相隨似應便譏羡函山探慧跡自慚百丈老開田荷衣破處雲重補喻火殘時夜不眠斯事非關豫造作古人標格更超然每自乖違百不能得無一法繼燃燈先將具骨埋丘壑懶學諸方弄葛藤野鶴無糧常獨立金猿歸嶂競高登昔人謬向途中覓樂我青山有幾層匹徑紆回與世分階前草木也生薰眸中景色空中見律外宮商野外聞破衲洗新三月雨孤笻觸斷數峰雲自從踏著閒田地笑看勞生竟日奔去聖遙兮似可悲分明底意少人知鷲峰古路原平坦火宅窮兒自嶮巇信步高登天地闊翻身回顧水雲奇只因樵父通幽徑百億山頭盡展眉松扉誰設復誰關朝夕煙雲自往還旅夢沉沉何日寤溪聲灝灝喚人閒興來獨坐階前樹倦至高眠戶外山對景了然忘去住徒猶移舍入林間渴飲饑餐不易忘頭阤半似耕夫忙村雞初唱鞭牛起岸圃未鋤任草荒一望秧針柂雨緑數疄麥浪檻風長年年活計頻如是不問丹家辟穀方懶惰禪翁懶說禪臥雲嚼雪度長年案頭書卷自深蠹澗底藤蘿樹久纏宿劫為誰培佛種斯生感我結山緣幾回提起其中事笑破閻浮一粟天瞻風撥草遍追尋遺禍至今恨少林茅屋蓋頭山斧缺竹窗粘紙蝸房深雲僧訪侶迷青嶂田父擔簑過緑陰試問溪聲長灝灝如何流水不流心石屋無門竟日開聲聲色色現如來楊堤和煦鳴黃鳥竹徑迂回長緑苔坦度光陰忘動靜淡交師友愧陳雷紅塵不識深居意謾怪西山與大梅不學天龍豎指頭孤峰拔削任優游補茆屋脊防深臘架竹山腰接上流岸樹年高從潦倒潭光夜靜費尋求道人既得安身訣渴飲饑餐即便休糧為門縛草廬不窮寬窄任他餘山花斜點高低岫石笏橫刊草篆書運水搬柴原合道棒風喝月等歸塵本來大意離言說多口阿師謾舉敷誅茆大意若為誇粒米莖齏富作家曲徑平鋪褁石蘚圓盆獨吐出泥花眉端展托三千界口吻播揚一聚沙嬴得萬機不到處任余高臥老煙霞朝朝幽鳥屋頭催喧動庵中一著棋破灶無煙從石乞高峰有路指樵知千年狐魅將離穴半夜寒蟾尚在池豈是名山多占住乾坤容我老天時百山解制大道無門處處真不勞開廓自相親庭前柏樹連天翠野外桃花匝地春得意分明先吐露諸方何必涉關津須知任運縱橫者盡是心空及第人登紫霄巖二律浪跡於山山任顛臥雲樹種是奚年洞門無鎖空羅漢有羅漢洞劫石未灰闢線天有峽石望海窗虛長湧月有石窗度溪橋險急流煙有天台橋何須遍覓同風客觸目辟支意儼然奇書何代鐫峰巔擦盡苔痕不見年寺隱禪翁疑即佛山高樵子競登天嚶聞花外千聲鳥杳視人間一縷煙惆悵滄乘經幾度巖阿松柏翠依然訪龍潭主人不遇春霜踏破緑將萌谷口徘徊幽致生一派嵯峨還石怪萬峰光霽亦龍鳴水簾懶捲耽高臥鳥道初修興獨行何事我來君又去空留古樹掛愚崢雲崖姪巖遊回用韻似之插碧巖高動勝遊看來溪澗擬何流空庭種樹從龍老遠岫歸雲入夢幽授系濫觴休逐隊卓錐無地可埋頭于今且話風光好幾片落霞天外秋寒巖夜雨暗灑群峰雨色平瀟瀟楓葉落無聲隔窗松塢疑堆雪滴臘梅梢漸放英孤剎棲雲山益靜空階琢玉夢尤清枕邊溪澗來何處幾度澄心聽不明謝別髦伯陳居士皆山樓度夏半生隨處寄孤蹤城市林泉野鶴同落筆成詩慚賈島垂機接物體靈峰山皆夢裡難為畫樹老庭前易得風揖別草堂誰是主又憑蘭棹泛橋東贈人山居勞勞世路竟何求老對青山自寡尤耕鑿不知堯舜力吟歌渾在羲皇秋門無車馬驚眠犬時有魚鱗上釣鉤嬴得此身閒白髮猶然移舍向羅浮明發寺避暑有懷炎炎巨冶欲流金何處清涼不可尋戲水魚翻菱艇暮迎風人坐槿籬陰浮生誰到無寒暑大樹還期蔭古今蟬子也知秋色好連綿枝上奏新音花月吟花自嬌癡月自光移花待月靜中忙凝枝月似貪花媚破蕊花疑笑月香月殿高飄花若粟花軒冷照月成霜幾回尋到無花月片片花飛月未央隨花移步月微明晒月花容分外清花下詩成山月小月中夢落雪花輕重重月色花梳影皎皎花誚月寫情花月相逢談未已鶯花枝上月三更次黃任者爾矩二居士雙峰訪友不遇韻鄰近山高想未休獨憐草榻續莊周尋風海外疑將隱泛月峰頭勝遠遊負我吟窮千片石多君彈落一天秋浮生景象渾流水何日披簑共狎鷗題紫霄圖為無依禪師壽曠世巍峨不變遷壺華遠揖自何年無生猶採溪邊藥得意多逢海外仙磊落天台長掛瀑高標松柏翠摩肩我今笑問同流者墨跡山光孰後先除夕懶向爐頭焰桂薪誰家雪調奏彌新三冬寒色消今夕半世低眉愧古人歲月如舟長送客江山似我亦徒春可憐無限梅花好獨立窮巖野水濱寓鏡庵雨後觀湖隱隱峰巒洗未休競來城郭震中流興波鱗甲潛明鏡貼水芰荷泛小舟樹隔人家春浩浩岸空煙靄思悠悠吾生蹤跡云何似月印湖心任去留祝定于林居士八秩無心釣渭貌如童培植名花振古風鬧市禪高里齊眉聞道肖龐公蘭亭墨跡千金重蓮社壽山七軸功自是瞿曇真胤瑞戲遊場屋仰翁翁乙未東十華黃居士深山戶外繞風塵箕踞終朝不厭貧靜養道容同野鶴懶詢時事向傍人圖書架上青氈舊花石庭前白髮新買酒無錢奚足問飛箋千古羡名臣鷺翩翩遠近漸成群瘦影翻風渺見聞天際歸來千點雪松邊散去數峰雲白衣雖有山林氣潔操未除湖海氛田父不知獨立意將為終日伴耕耘到柳塘有感溪山謾道不如前自古風雲易變遷傑閣無端傾沼曲疏楊依舊繫橋邊荔陰摘錦嗟芳草石鏬摹詩見昔賢瘦策未忘彭澤路數聲清磬落秋煙莆陽積雪昔年何事吝閩關千載峰巒忽變頒活潑明珠旋大地橫斜古木冒寒山梅花戶外乾坤老柳絮階前鳥雀閒林下誰如乘興者氛氛蘭水一舟還時有客過訪旋即歸掉隨處樓臺不見高村村砌玉逞英豪蒼松指日頒髮鬢白石連宵長羽毛一色江山迷水月半空花雨林皋夜深晛晥疑將曉呵凍推窗望幾邊雲頂巖訪友不遇謾道無緣卻有緣我來依舊各山川空巒寞寞惟聞鳥怪石巖巖自插天不意主人移錫去只餘童子伴牛眠古今那個忘行跡眼底群峰鎖暮煙再登彌陀巖寺老僧稀古路荒禪林與我不相忘舊時野色隨秋變何處梅英遏雪芳掃石畏言興廢事採芝憶入水雲鄉堪嗟樵子猶未返洞口凄凄日又黃次韻贈蔡子穀居士歸耕名場戰罷隱乘田學就耕鋤老歲年半畝黃花榮別業數疄紫芋謝塵緣閒攜竹杖風前詠倦枕簑衣月下眠受用現前忘取舍人間任笑老龐顛百山朝雲遠布松扉才啓鎖重重何處飛來淡且濃幾片山浮天國外萬家人落冰壺中深林有意留棲鳥高木出頭慕遠風千里瀰漫歸幻化依然日掛海門東挽長兄無瑕公昔日君來既占先於今歸去又爭前戲遊浮世同春夢敬奉慈闈契孝篇筆底已償翰墨債杖頭猶缺酒罏錢連枝別處寧無淚滴滴紅痕濺梵天登青入樓四壁藤蘿掛石芽樓居素搆閒乘麻憑欄何處來山色飛鳥無心度水涯巷僻多藏支遁鶴路深渾過葛洪家極眸隱隱人煙裏幾樹荔奴幾樹花百山別韻峰禪師回莆省母鉢掛峰頭已度秋下灘孤棹似難留歸心雖未逢壺嶠夢境猶如離建州兄弟別時明月共母兒會處望雲收他年好憶今朝約老我青山借一丘贈可光禪師從金粟歸漳省母飽餐金粟幾多年回步嶺南色轉鮮蒲履未成難釋手樵薪得價始辭肩追風駿馬道途別脫網金鱗氣象全珍重莫為煨芋漢投機句子待高宣送古門汶石二禪師回柘浦舊隱同門出入日無多衣鉢共擔離薜蘿少室久培雙桂子南宗預播滿娑婆歸途不涉舟之陸過嶺任他險且峨舊隱于今花正發時看百鳥噪巖阿贈未發禪師峰巒十二久藏身撥草瞻風度劍津黑豆拈來芽未發青霄指出日高申梅花破雪休嫌晚松柏經霜不變春庾嶺近聞消息好一枝橫亞蓋天人明發守龕同淵堂禪師匆匆踏斷路三千籌室風微隻影懸座下躊躇秋未晚燈前追慕月猶圓憑欄畏睹空庭樹拂几愁看絶筆篇嬴得先師靈骨在何須更覓鐵鍬邊慧源菴來源浩浩自何年流出未灰劫石邊賢聖不從穿鑿得溪山豈為古今遷龍憑一滴時為雨庵若孤舟日泛天假使馬師都喫盡老僧奚處可安禪秋同林獻十居士夜坐待月無人月自遲傍花共坐兩三枝深林寂寂鳴栖鳥落葉疏疏過短籬鐘磬敲殘蝴蝶夢溪山題盡謫仙詩多君閉戶風塵外獨對青燈不下惟寄懷林六觀居士于應州丈室幾度衝寒望轉迷擬登霄漢恨無梯鴈門八載魚書杳道義何人丘嶽齊栖隱未歸徒入夢文殊已見勝留題奚時大奏旋師調使我聞風興倚藜到普明寺和南光禪師同苞瑞竹韻沿林翠色溢青眸獨爾分枝合出頭引鳳栖岐胞乍裂釣龍播浪影雙浮交成九節扶吾道無讓七賢隱此洲借問幽篁何並胤紫芝朵朵羡同流甲辰荔月訪月川禪師不遇阻雨有感奇峰疊疊擁行舠才憩梅陰暑漸消書在案頭人未返花飛庭際竹隨嬌一笻山水同為客六月樓臺讓掛瓢幾欲快談庾嶺事翻空風雨恨連朝翻空風雨恨連朝村舍城隍欲並漂半載田疇遭旱魃百川舟楫繫山椒人雖無力回天地世合何年治舜堯四顧炊煙平寞寞寄言野老謾歌謠喜晤雲和徐居士於報恩寺兼以言別久交方外寡相逢幾寄山音遠不封晤對仙溪春印月留談佛國曉聞鐘著書豈獨為親老閉戶何如自性恭千里別君無別囑歸期從此看蒼松悼明覺憨璞禪師皇岡聚首愧英才南北信音去復來祖道蓋天期共振形山拔地愕先隤都欣師子喧金闕何遽鼠聲吼夫梅莫是群生無可度翻身從此出輪回和鏡庵即事韻偶隨花雨出青巔湖上于今半是蓮門外草深通鳥道梅邊僧老寂人煙邀松共話三更月倩曉高眠一榻天此際藏身何處好數間茆舍碧巖前龍華元旦峨峨古寺控乘麻春色先臨道者家庭際未消殘臘雪簷前猶綻去年花江山乍暖和風轉草木新青生意賒老稚都云添一歲誰知鬚鬢染霜華度歲煙市雞村事若麻當來春色屬誰家出墻竹老疑抽筍帶臘梅寒競放花自笑年高迎送懶幾經山靜雪霜賒群英聚首渾魚水樂我烹泉度歲華慰用光張居士讀書山中遠別高人路覺疏擁門草色倩誰鋤知安忘卻家如甕不餒幸然腹有書桃李山深皆勝友池塘春漲半新魚休云學稼非吾樂元亮當年也種蔬挽儀部小眉林居士昔叩松扉月正明望君世外作長城心花吐出驚人句玉斧鑿開蓋代名久夢華胥今始寤亟歸蓬島尚如生歷觀盡是崎嶇路且喜翻身此一行嘉興嚴𨍏轢居士重建普明寺落成和韻贈之開基昔想是高僧高士再來猛振興螭殿俄含浙水秀祗園多擁法雲增聚沙作塔功猶戲捏土成金願至弘勝跡古今雖未見何人選佛占先登別林定于居士往浙省覲烏山結社憶蒼童為道周流鳥跡空世使有君閒逸少心期與我老崆峒尋秋遠泛錢塘月入幕高瞻隱者風不盡悠悠方外意一藜草色碧關東雪庵度夏寄林介卿居士為愛緑陰伴翠霞訂盟月色作鄰家草荒僻徑無鳴犬客去空庭剩落花不盡清風長獨得何曾紫陌隔千差真如面目塵塵現洞口尋源錯泛艖雪消丘壑蒼黃不變遷重重粉飾信徒然寒林野鳥翻春夢皓髮山翁轉少年日曬瓊瑤惟樹在玉成樓閣幾家全樞衣極目松門外萬里畫圖捲碧天挽南山二勝和尚尋常履踐異凡胎吳地閩關去又來六載當軒撾毒鼓九秋和葉落黃梅鳳岡月隱姑蘇暝籌室雲封蘭水哀自是丹青描不就依然撒手返天台和余諸居士禪堂茶話韻窮盡玄微總不干且燒木佛共醫寒喫茶好覺趙州語拜將猶驚漢主壇緇素談禪星欲轉安懷聞道歲將殘暗香何處通消息疑在庭前白似珊答赤庵張居士見贈梅花百詠韻歲寒無處避香塵白傲孤山不動神一字多償筆底債枯腸倒吐隴頭春中峰獨唱酬高士孟俯續題見美人月色朦朧臨薄暮數枝橫亞更天真又和蓮山夜宿韻獨掩禪扉夜未央隔墻杳渺任花香無思豈但溪山靜得意何如夢寐長定裡疏鐘敲落月覺來幽鳥噪寒床儂家不為光陰轉閒伴希夷臥上方祝同門林杜則居士五旬塵世又來戲一遭半生白眼視英豪靜吟海內驚人句險奪江心度葦篙和俗嫁婚傳祖印移風鬚髮掛禪袍知非豈待從斯日自有南山插漢高再登座山贈智鏡耆舊蓮灶分身十載餘磨礱山斧共山居風霜歷畫眉皆雪田地坦然草自鋤古德應承龍樹後遐齡好悟威音初我來幸得秋光舊一徑黃花一架書辛卯重陽從棲雲寺登壺山何曾壺嶠在塵寰天外巍巍立翠鬟草莽奔馳惟塵豕煙霞舒捲半江山秋深古寺黃花罕僧倚亂松燈石閒棄興更登高一步長空無際可躋攀和韻祝宓仲居士五十初度搔首撫松讀易初品茶灌圃興難除高蹤遍寄名山上大業咸推太史餘浥露芳蘭多放蕊藏春道樹翠凌虛慚豫馬齒徒居長一片浮雲自卷舒贈林四紫居士見訪歷盡康莊嶮與平現前妙用撼群英禪關廓徹藏屠釣國士馳驅慕姓名幾度過山尋白足不時採藥拯蒼生誰云相見無餘說戶外峰巒事送迎同居士半山觀漈曉起招邀望翠容停笻坐破冷淙淙風塵不宿溪間石雲月常居天際峰何代山靈遺半榻尋秋隱者入千重嶺頭松下皆清響奚必雷音震碧空省逸叟和尚干通天次季蘆余檀樾韻處士逃禪性自明數莖雪髮理寒鐺交將草載同稱老病久何人不厭生竹葉風敲深夜雨梅花月晒碧天晴箇中無限炎涼處剔盡殘燈話不清通天元旦候余居士不至適寄詩索和因次之忽聞鳥語噪生臺舊雪呼童掃未開拭目堤邊看放柳臨風戶外聽吹梅多情白首遙相望有約青春近再來但得心遊鹿苑裡勝將屐齒印新苔懷蓮社諸居士慵追白叟跨青牛高枕深山萬慮休鬧市安禪遲復道寒江釣月托孤舟聞濤松下思清詠拂石梅邊憶勝遊語寄華軒春色老數聲黃鳥囀南樛遊西明龍潭山深秋色半陰晴野徑濛濛鳥語清溪澗紆回流不歇煙雲變幻畫難成垂簾洞口空塵跡蘸月波心冷世情我到偶然高謦咳臥龍聞亦不須驚重陽後一日同林聖禎訪靈山主人尋盟登眺擬奚同帽落萸筵信已通門外接人千尺澗峰頭涼客一秋風見樨莫謂聞香晚話月偏欣遊履空處士逃名聊借問幾回移菊醉籬東送朱李二居士回建州步韻一天秋色正縱橫分手空門月未傾歸海波瀾方浩瀚從龍煙雨溼肥輕雞催茅店千山渺棹裂困津兩岸鳴沽酒不須頻借問家僮預奏洗塵行詠拜歲蘭山谷深幽懶結家庭前奕奕恍流霞才聞葭管催春信特掛朱衣迓歲華間靈何嫌添秀麗放梅休羡獨橫斜數株濃淡風塵外笑裡含香韻更賒龍華八詠寶幢峰千尋崛起秀芙蓉望似高垂宇宙中縱有毗藍吹不動巍巍亙古衛琳宮萬歲石峰頭片石自玲瓏價重連城蘊緑叢神斧錯留尊貴跡勞他煙靄日磨礱文榕樹神曾於宋朝試中狀元名曰章榕盤根錯節護招提葉葉榮垂霄漢低樗腹剖無元字腳怪將名姓榜頭題古椿積翠心空不記年如松如柏勢擎天陳風倏忽狂吹倒認作蒼虯陸地眠龍井乾坤鑿破憶前朝躍出雙龍達海潮千載甘泉猶混混何時頭角復昂霄蔣公橋捨宅家移別一溪欣通線路駕虹霓昔賢聞道浩歌去芳蹟傾欹控馬蹄放生池春草離離溢砌芳化龍鱗甲隱方塘年年不但蓮花好明月自來水自蒼雙塔石筍抽條貫古今亭亭拔地鎮叢林玲瓏八面憑風雨剖出虛空不動心廛中度歲兀坐毗耶夜未央數聲爆竹震笙簧門前燈火誰家少直待年窮始放光怡然共話一枝香繡佛尊前日漸長饒舌梅花三五朵浪傳春色過高墻送韻峰禪師回長慶一春花柳正綢繆何事春風不久留舍卻江郎三片石乾坤誰是爾同流大人克振大雄風長慶山川況不同脫肉螺螄輕起驚天動地一吹中途中贈木庵禪師回溫陵金粟飽餐憶有年途中握手共怡然春風吹動泉鰲遠為雨為瀾逆百川寄別芙蓉石竇禪師幾回結膝話榕陰兩處行藏一處心慚愧芙蓉開鐵樹令人扳仰向秋深到天台石梁誰道奇巒路不通嵯峨片石貫西東珠簾萬丈無人捲留作雷音震碧空答玄錫禪師韻清臞道貌日忘疲傑出法王老小兒隻手匡扶雙世界江山為口歎希奇歸家拜母橫擔楖栗下千峰低首和南老北堂自恨平生無俗骨故臨世外振家風母諱日有思昔年此日喪慈闈逆子途中尚未歸欲睹真容難再見低聲秪得淚雙垂挽陳博仲道友少年何事著忙生踢破情關撒手行到此誰人留得住杜鵑枝上月三更收骸髑髏滿地絶人收水浸風吹何日休拈起青山一撮土幾多死漢受埋頭偉貌嚴裝假外修一朝敗壞恨何休于今一穴同埋卻是智是愚謾出頭瓶梅暖閣寒窗素所宜橫斜托出兩三枝陳風忽向冰壺過引盡清芳入雪詩別雪車參友歸路三千共一盂松林茆舍喜同居故山不羡君先到脫落芒鞋快有餘採豆一番下手一番疏收拾歸來不可餘粒粒珠成香積供任將老幹帶根鋤個中緇素不勞分葉落花殘獨子圓無底籃兒盛得去明年成實又憑君走馬燈一點靈光照四天勞勞誰聖復誰賢中心樹子輕搖動千里烏騅不用鞭狂心未息也堪哀匹馬單鎗去復來勝負盡從風火轉不知誰是出塵才九鯉湖兩字利名徹底空何勞特地叩丹翁春秋來去知多少已夢還如未夢同聞道再成入九天依然共在水簾邊夢中說夢無昧息疑盡浮生似可憐舟行朝暮衝雲泛遠汀生涯何必問華亭高低未度前村樹又見數峰峰外青須臾解纜過滄洲棹裂青天逆水流分付蹲身篷下者未經登岸且低頭端陽懷古驚心幾度改山河寧有忠魂戀汨羅投黍空流曩日淚不堪回首問漁簑待木樨香吾無隱爾契誰能借問枝頭吐未曾未吐香前聞得徹又添公案上傳燈贈獅山上人倏居城市近聞知戶外傳來消息奇師子能生師子子猙獰不被文殊騎壽余母吳氏七秩無樹菩提久自培年高結子象黃梅閒來含笑問王母千載蟠桃嚼幾回謝金栗齎衣專使吳江越嶺兩間關滿路春風送客還衣鉢勞持千里外汗顏無任強開顏臘八樹凋葉落四無鄰風雪彌天凍殺人納被蒙頭曉未起徒然夜半燦星辰詠眠牛石高臥緑叢不記秋風吹雨打懶昂頭乘田滄海從遷變新月母勞再下鉤途中別友杖底劃開一片秋平分歸路各優游何如故國風光好紅蓼盈堤映客舟贈柯無右居士倡放生會勞勞不盡放生人獨有維摩放最親鱗甲羽毛同一體驪龍原是赤梢身送石濤侍者住塔山昔執巾瓶伴九巔生涯今寓钁頭邊片心不墜先人志千載浮屠尚儼然過釣臺胸羅天地傲風塵豈慕王侯立渭濱恨自客星消殞後江邊不見釣魚人詠佛手柑為掌為拳在屈伸牽枝帶葉示天真秋高不舍黃金相結果林間遍接人題竹石圖蒼苔未發已深幽古木亭亭不記秋為問嵯峨幾片石山中誰是爾同流探梅送徐雲和居士讀書歸舍枝頭含蓄幾多香豈可山中久晦藏時節到來人盡望分明有意待東皇雞冠花昂垂翠羽立階除迥奪千年鶴頂珠幾度臨風爭鼓翅恍傳曉曙動閻閭詠筍林下冷埋頭寸心堅似鐵揭石出南山破籜成九節春來雨露滋聳與雲交結路中作行路難經盡水潦山寒旅亭上霜月初殘千里復蹣跚隔墻花發如丹翛然舉首停看石頭松下勝長安野老餽盤餐贈千花監院悉遠一朵拈來撲鼻香分枝結子永昌昌春林紅紫皆如彼況是千花大棟梁贈印水禪人流通百丈事何如浩浩波看出嶽初徹夜一輪圓印破了無明暗可分疏贈黃秉中居士幾度尋僧樂品茶禪林誰道不如家片心養得閒於鶴高臥羲皇掃落花七夕秋色乍飛月乍蛾天孫夜靜渡天河巧機不必年年送士女于今巧更多題松石圖為淡然禪德壽傲盡風霜勢插天蒼蒼秀色染林泉謾云不藉栽培力亙古根盤劫石先偶成勞生擾擾總空花金屋玉樓未足誇萬頃青山何處好隨緣去住老年華和採桑小詞韻曉起匆匆覓小筐含羞出戶未梳粧採來俱得群蠶足始憶庭花入袖香贈郭卓人居士吸盡西江賣箍篱一家行徑惹人嗤君今造得龐公地任是丹霞不敢窺勗常山質山監院參方衲子莫愁貧木食草衣度一身萬仞祖關惟得倒山河齊發少林春贈知公黃居士名山已賞半坤維行跡惟多雲鶴知舉世何人能遁世如公高蹈信希奇贈尼圓善童真侍母出溫陵掃盡浮雲志願弘古鏡磨來光遠照勝於月下讀傳燈示常山侍者慧幢趙州悟道值青年羡子事師志益堅執侍巾瓶無倦已奪標異日自爭先勗眉圭禪士參禪堅發志諸祖莫能欺錦鯉嗟淹甕虛空徒畫眉溪山高養性花鳥富生機俯仰心無愧超群自有時
