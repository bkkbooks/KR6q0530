body:
  text: 嗣法門人性深等編雜詠下梅花百詠梅種遺來嘉實木天然嬴得色香一著先枝葉奇從箇裏發溪山何處不堪傳種梅為愛聞香霜雪前多培巖下與溪邊箇中含盡未生韻發幹成花任歲年丐梅久慕林逋騷興奢株株搜索通鄰家山翁謾笑余貪愛異口流芳占百花移梅蟠根豈必定何宜官閣未嘗異素籬瘦影忽隨斜日去寒蜂空向故園窺溉梅緑葉蕭疏雨色遲不辭朝夕灑枯枝因貪霜夜香明月費盡勞心秪自知接梅截斷他枝見本原別拈芳萼續新痕寒花未即樹頭放紫陌從今變雪村盤梅請披雪幹自高低巧結層層剪不齊何待天花如雨下滿盤間托小亭西尋梅遠近無端煙谷迷此間春色向何棲方隨倦步前村去文道相逢在小溪催梅山谷衝寒意已深況多騷客每相尋連宵好向南枝放莫負原來一點心夢梅高臥山窗百慮清空花蹤影見分明幾將身置羅浮上爭奈簷前鳥一聲望梅停策極眸光霽天數株含雪倚墻邊分明裏許無人見誰信孤山尚儼然聞梅清香拂拂自何來莫是梁園花乍開得意不堪重話破階前月下獨徘徊話梅孤標絶世動評論淡致不親豔冶魂有説會歸無説處舌頭香噴兩三分見梅不盡清高興倚闌枝枝橫亞競衝寒現前消息無心得總與時人一樣看賞梅幾回高詠玉林間靜致須還靜者扳支杖更詢何所有六橋深處是孤山詠梅閣筆山房與雪鄰花心知我亦傷神現前一句輕拈出字字清馨欲逼人折梅東君有意付阿誰立雪高扳香滿衣歸取永壺聊索笑草堂倏爾漏春暉寄梅江南春色間先得方外交情淡更深千里借君通線路見君便見故人心浣梅雪骨永心絶點塵臨溪猶沐笑顏新一枝拈出深深處分外香侵物外人掃梅無端片片落東風擁篲尋常惱曉童幽徑何曾嫌砌玉山翁偏愛色塵空簪梅懶將紅紫插鬟間幾點斜分雪月間冰骨不須多粉飾自然清雅奪朱顏嚼梅攢卻眉頭折卻牙拈來借問熟誰家謾云滋味無多子得意方知韻更嘉繡梅含藏春象一機先間想冰肌到宛然玉線未抽花已吐誰知不向指中圓畫梅幾點墨波傳素質孤山未雪吐低昂草堂高挂清如許錯引追芳蝶數行梅箭孤高骨格奪春風直幹多抽曲幹中未射已穿斜日影梢頭棲鳥誤傷弓梅葉花落玉林萼又新晴軒幽徑翠鱗鱗清霜剪盡非干妒破臘高梢舊有人梅蕊碧眼纖纖乍有無連宵霜露釀成珠陽春景色含多少惱殺遊人未肯舒梅香芳韻沉沉西復東襲人遠近只憑風豈無形迹堪追覓盡在花中與雪中梅影寒花錯落映蒼苔不定光中去又來生滅根原何所有真容見後絶疑猜梅子多餐雨雪産春煙葉載青黃相間妍辛苦釀成滋味別偶然聞見亦垂涎含梅五葉花芳迥不群似迷似悟樹頭分化工指日同開眼白傲山中聚散雲開梅傑閣寒林倩玉粧飄飄遠望一天霜東皇不解深藏舌漏泄枝頭多少香殘梅素心默地每相留不住孤梢恨不休去亦不須風雨送頻將流水作遊舟孤梅獨立山中與世遙風塵不傲自高標等間放出花三五羞殺群芳浪鬥嬌瘦梅歷盡冰霜獨占貧乾坤無礙一臞身孤標不以形容媚誰識花中骨立人矮梅庾嶺遺來久屈身年高枝葉更低人東風幾度吹難動嬴得花飛大地春枯梅高居物表勢何雄兀突爪牙半是龍鱗甲雖然脫落盡明珠猶吐碧空中倒梅迢遞春光不記多一堆白雪臥煙蘿孫枝幾欲高扶起爭奈傍無著力何蚤梅奪得東君第一叢先來壟上餞秋風競霜菊叟休相訝為愛追陪晚節中遲梅同芳何事不尋盟獨立溪邊褁雪英待遍樓臺無覓處放來偏占一山清夏梅昔時美景盡驚過珠玉皆空剩緑羅林下炎蒸誰解得含冰幾朵不須多秋梅霜露繁凝葉漸空亭亭赤骨傲金風有香何似無香好免使遊蜂戀碧叢紅梅穠豔數株間碧叢胭脂點點綴東風明朝假使隨流去人道桃源路已通綵梅隨殘隨豔總非真生意雖稀亦有神借問誰家傳妙手一枝剪出綴陽春玉梅不從培植吐林丘質潤香空異素儔五葉琢開霜雪外孤高聲價待誰酬夾色梅東君何事喜揙斕一樹嬌分兩樹顏自是清高禁不住多塗脂粉賣人間重臺梅數朵疊成一朵奇心花如雪吐南枝本來無樹臺何有假設重重欲待誰緑夢梅衝寒滿口嚼青霜芽茁纖纖趁蕊粧不但緑珠顏似玉至今肌骨也芬芳品字梅同氣交參不二門分身鼎足小乾坤妙容脫落春風後多把摩尼認作孫磬口梅即臘梅輕風細雨擊無聲滿口香騎蘭蕙清高士休誇多結子誰如黃面不留情點額梅春心托出許誰知一點高縣綴翠眉撩亂禁宮同窈窕買多京國貴胭脂紙帳梅山房布置淡相宜紙帳疏攤雪數枝疑是有香生竹榻仲舒旦暮故垂帷樵擔梅一山春色一肩挑幾度相尋獨老樵巖谷自憐留不住卻來煙市賣清嬌鳥銜梅逐隊高翔入雪林銜花已見獻花心無端錯落寒巖下猶向空中取次尋杖頭梅瀟灑數枝任倒顛間笻頭上白雲翩幾經雪後增清價買醉何愁缺酒錢盆中梅枝蟠何以異浮山不動根原去住間大地無私香不著誰家孤鶴立庭間燈下梅漫將淡致寄山房香散深宵雪滿床一朵忽然和影落驚多蝴蝶暗中忙瓶中梅幾本橫斜清韻多壺中寄迹似巖阿支頤試問忙忙者門外尋芳意欲何舟中梅滿棹清香自去留乾坤無著漾悠悠年深懶作羅浮夢伴釣寒江雪一舟馬上梅征鞍欲挂已傳馡萬里春光急似飛野草如茵鞭影過相逢盡道玉郎歸挂月梅徹夜寒光映雪枝花明猶怪衆星稀婆娑影裏人天靜幾度暗香獨自飛臨風梅梢頭渾似散珠璣逐景蜂狂戰雪飛到底為憐春色少家家斜貼半蘿扉雲棲梅濃淡留連未肯飛隴頭誰道故人稀憶從出岫無心後高臥芳叢任白衣帶雨梅碧玉翩翩不染塵淋漓樹下恍鋪茵寒香洗去知多少幾度憑闌嘆美人冒雪梅破臘香沉六出間氛氛千樹戴芳顏清光一片描盡就珍重趙昌莫等間苑梅久培素質淡如濃倚日撑雲傲漢宮嬪侍只憐肌骨瘦不知身在雪霜中丹墀梅吐盡珠璣壓衆英似留香味待和美不知林下歸何日白首猶耽玉漏聲邊塞梅百花叢裏逞英雄卓立孤城勢若龍謾道玉門春不到年年香襯馬蹄濃海鳥梅瓊花錯擁一江天雞犬聲稀春色全任爾夭桃誇豔冶蓬瀛消息占傳先僧舍梅鐵幹亭亭挺出塵久經冷淡見天真數枝庭際將舒臘渾似當年立雪人隱居梅謝盡浮華潔一身深居巖谷倍精神王侯不解高扳賞惟有琴書入夢頻書館梅獨培庭際意何如為愛香侵几上晝夜半忽然花影落驚殘春夢到華胥琴閣梅暖閣花飛逸興增古絃彈罷月初登孤梢斜倚西軒外休作玉人側耳聽笛樓梅歌管聲喧雪未開高低吹入別樓臺江城五月殘猶晚好向陽春律裏來譙樓梅嚴凝樓外碧高低畫角飛霜子夜凄漠漠煙城人睡盡獨陪明月下峰西酒店梅煙火叢中雪數枝香延仙侶醉相知解貂客去多珍囑樓角于今莫挂旗妓館梅雪幹相宜傍竹溪無端斜倚青樓低春新花下多車馬回步嬌容付雨泥客館梅黃昏時節正衝寒白首嗟君行路難高潔一枝頻作主何妨征馬暫辭鞍村舍梅雞犬聲中白似霜數株屋角賣清芳歲寒價重無人識嬴得春深帶雨黃窗前梅瓊蕊數枝月一庭暗香拂拂透疏櫺尋光時綴琴書上高臥主人見未曾戶外梅凝霜瘦質立簷牙消息未傳預放花隱者相尋何處是舉頭認作林逋家井邊梅瑤花何事傍疏悟展轉春聲近轆轤幾丈泉深長濯魄騷人猶折寄水壺橋頭梅雪冒危橋夾岸馡去來襲盡度人衣可憐花外風塵客猶笑簑翁坐釣磯籬邊梅黃花乍老槿餘酣碧蕊須臾放二三臘到故園催點綴高人幾度倩笻探路傍梅閲遍風塵白滿眶霜華未結也清涼雖非大樹遮天下留盡行人撲鼻香溪頭梅數朵蕭疏挂碧流淡容不漱自清幽漁樵竟日忘來往花下何人泛剡舟江上梅乍渡陽春春又輝亭亭不逐蘆花飛相知惟有波心月徹夜梢頭照雪馡松下梅清操同老質同堅寒色臨梢不變遷誰似蒼顏與皓首盤桓林下兩忘年竹間梅竿竿翠裏立芳顏春色深藏孰解扳為問龍孫何日長高扶老叟出青山柳隄梅未展新眉古陌黃先開碧眼瞷春光亂絲不必長相絆自有清風播遠香居山梅木石作鄰雪作窠相知惟有牧樵多孤高不鬥間花豔誰信春光在薜蘿出墻梅園外春光不盡窺引多車馬叩松扉橫斜何必人如玉過客也沾香滿衣覆池梅根蟠水際別風塵蕩漾清波枝葉新魚鳥休疑花影動是龍早已自翻身倚石梅傲骨長依片石幽花晨雪夜恍羅浮年高正好酣春夢矯首話君謾點頭挂瀑梅瀑布飛花一樣清縱然藏迹未藏聲水晶簾外雲初捲粒粒神丹煉不成懸崖梅臨危古樹偃崔嵬潦倒花飛春乍回遠望何人扳得及還他高士老山隈墳林梅花落花芳俱不知徒傳春信向南枝浮生到此須開眼去後追馨亦已遲聖廟梅素心時傍至人居樹不在春韻自如雪裏文章天地老浮生空讀焚餘書道院梅賽玉花飛別一天丹成何處更求仙孤高不為劉郎種桃李休來問歲年佛寺梅不假天工自破顏枝枝香擁雪中山東皇面目無高下分付伊人信手扳落花吟三十首次黃十華居士韻一東群英次第托林東倏爾孤飛度翠叢倩月疏攤書案白承風斜點釣磯紅神光間寓枯榮外芳躅徒馳枝葉中蜀魄啼時春已老幾人對景悟真空二冬漸減南枝一片濃不堪煙雨遍遺蹤藥闌豔冶多延客香國虛無錯引蜂樹老青存龍甲瑩村深紅逐馬蹄伀高低為語休爭價俯仰茫茫盡醉容三江縹眇非圖掩雪釭驚回幻夢到山窗未曾結子垂仙苑幾度隨流濯楚江和靖空遺梅鶴影富春惟見去來艭芳心一點今奚在不逐狂風獨自降四支繁榮久戀亦堪嗤浪逐韶光棄故枝失隊黃鶯猶欲語離巢紫燕向何之畫艎泛盡無人渡金地鋪平映月遲自有天工間作主從來形影不相思五微把臂相尋入翠微爛紅一徑掩松扉離人始覺留無計銜鳥何曾去不歸點綴古今能幾朵廓開天地只空幃許多猶作紅塵夢惆悵殘霞對落暉六魚紅紫何曾染碧虛一天瀟灑浪居諸籬邊瘦幹猶堪愛欄外清香望再舒不盡聲消鳥語後偶然影落夜明初年年景象渾如是匝地芳蹤懶掃除七虞極日園林半緑蕪從前粉飾費工夫空枝未曉星初隕殘蒂深宵月更孤斯際歌中猶有酒誰家臉上不垂珠眩人顏色須臾改徒把黃金鬻畫圖八齊紅雨瀟瀟望不齊晨風夕月灑東西淡濃錯落苔千點桃李虛粧夢一蹊羽士悟身洞幻化高人托意遍留題春光何事隨流去路曲山深九佳物華節候偶相諧多恨群英自活埋幾度鳥聲催夢半生國色葬空階丹翻大地疑仙島春去誰家脫草鞋石罅苔斑皆落處謾追孤鳥過天涯十灰窈窕難辭歲月催愛君幾度獨徘徊積多珠玉門成市棲老煙霞水一杯柳畔相逢渾有約窗前無語伴誰來東皇借問歸何促伸手欄邊挽不回十一真逍遙無處不天真任泊芳叢任出塵上苑于今休擊鼓故園奚異昔逃秦心空謾説成仙術葉落渾如去國人舉世未忘炎冷態頻頻回首暗傷春十二文家僮未掃遍繽紛疑是長空散彩文碧蕊含春驚破玉黃鸝繞樹啄流雲江山滿目哀遷謝版蕩彌天忍見聞時去雖非風雨事可憐片片燦溪漬十三元無意送春獨閉門枝枝月色漏黃昏參差鮮滴杜鵑血潦倒暗驚蝴蝶魂浮動江干舒瘦影從容庭際聽香痕上林憶昔顏如玉借問於今幾樹存十四寒未生消息覓還難偶涉春秋撩亂殘聞盡木樨非在樹飄空閬苑不成丹高僧定裏疑天散處士間餘呼鶴餐此際主人休眷眷明年依舊笑長安十五刪高低無處隱微顏一別青山望不還窗外催詩輕曳曳江頭別賦對潸潸色香過眼何堪著雲水追蹤未肯間最是有情枝上鳥殷勤相送下苔斑十六先貪生漢武遍求仙悟到空花亦可憐滿國黃金飛縹眇一池青草染渾全今朝豈復為渠妒昔日無端越樣妍月照空庭人睡盡寥寥愁殺美人天十七蕭綺園涉遍冷蕭蕭西子依稀懶賣嬌墜露驚殘棲蝶夢臨風疑伴落霞飄漢官緑暗無人到隋苑春深任草驕失路漁翁多悵望武陵何復獲招邀十八肴花片參差散遠郊猶餘殘蒂半春梢一枝胭粉原無著幾度杖藜是素交浪迹溪濆憑自浣獨吟松下宛相嘲山翁另有山中趣多種珊瑚綴草茅十九豪色香脫盡始為高氣候相催似太勞柳絮遙尋歸燕路杏村紅入酒家醪滿園採女憐鋪砌孤影移人懶讀騷惟有老僧多妙用六時收拾補方袍二十歌誰家高閣亂拋梭寂寂無聲生意多莫向春城爭豔冶肯辭祗樹共蹉跎香山積雪寒樵子曲澗堆朱染釣簑面目現前聊借問當年微笑事如何草一麻回首桃源路不遐流漣千里泊誰家天香夜靜凋明月金谷春深散小霞志士蒼黃留眼覷詩翁瀟灑向人誇寄言市上賣花者依舊歸耕問黍麻草二陽遊蜂久矣息追香香去餘枝自短長彭澤傷心寧種柳蘭亭得意獨流觴江梅早占群英老巖桂疏鋪幽徑黃士女休嬿多變態古今面目擲虛粧草三庚山谷嚶嚶曉未晴山翁高臥任凋英翩翩墻外扶無力點點階前恨有聲妃子已辭樓閣去正孫猶向村郊行一身自是輕如羽何處煙波不縱橫草四青怪卻枝頭漸擁青幾多朱紫盡飄零貞魂冷泊江心月涼夜孤依草際螢深望禁庭誰解醉試看覺樹遍垂馨陸離芳草徒延茂何復春風上錦屏草五蒸家家梅雨甚相陵洗盡紅粧獨久憑鶴過畫軒疑羽脫人歸香徑駭雲凌天工此日成烏有雪髮今年長更增看到榮枯環轉際何如高臥枕橫肱草六尤浮華蹤迹謾延留醉舞高棲得自由車馬已辭喧戶外煙霞無復戀梢頭芳聲撲地春還在幻色媚人敗始休何似松篁長滴翠飽餐霜露不知秋草七侵不盡芳叢變緑陰曉風猶恨急相侵蕭蕭臺榭沉荒草灼灼精華帶苦心萬象關頭多著眼何人林下獨投簪看他蜂蝶空來往自是無香可細尋草八覃草色苔痕月二三嬌移玉步下晴嵐人因對景驚春老樹亦辭金砥世貪瀟灑不承繁露力傾欹仍帶去年酣枝頭生滅經多少黃鳥于今孰與談草九鹽數枝疏影挂疏簾百億分飛動顧瞻人在玉樓猶未醒魚驚香餌卻爭噞原非仙子拋神劍豈是天孫墜幅縑無限升沉何所似殘雲搖曳過低簷三十咸東風吹去似輕帆象外群芳取次芟繚繞何殊天女散凋零猶有野禽銜了知景色原如夢淨掃煙霞自不凡回首故園多感嘆敲深夜月續玄函康熙三十一年三月板送嘉興楞嚴寺般若堂大藏流通
