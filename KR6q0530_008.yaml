body:
  text: 嗣法門人性深等編文金粟百老和尚訃音至掛幀祭文哀哉我師機峻群賢甫登黃檗徹見青天金粟流毒鐵枷上肩八閩兩浙坐賈行船驅馳龍象掃蕩蹄筌如雷震耳似月臨川有子如鳳展翥大千升階賜紫對御談禪帝王機契國一名闐既光列祖奚厭延年方回泖便謝九巔滅度時至親口宣傳訃音遠降令我狂顛才違裘葛怎止淚漣愁腸欲裂屈志難千斤之擔一脈如線衆星落落焉若孤圜法幢頓挫駑駘誰鞭素殊蒙昧承命慚先未能圖答徒自悲憐山花獻麗猿果呈鮮傾心座下叩首幀前願師垂憫俯降香筵納受禪悅輝煥林泉一瞻一仰面目儼然哀哉尚饗進塔祭文在蘇州鄧蔚山嗚呼我師無容湊泊巉巉巖巖灑灑落落光凌照乘之珠翼巨搏天之鶴玄機敏峻兮蚤廓徹于桃花楖栗孤危兮力荷擔於金粟建法幢于立身之始兮超古超今示泥洹於知命之餘兮何延何促出世之緣既畢兮月掩中秋涼人之樹摧殘兮聲騰西竺令水雲白足兮無處參尋湖海知音兮籲天慟哭孰不譅祖運微祖道衰法燈滅法門覆有露誰沾有雪誰立某等座下忝居兮慚匪追風之驥室中幸入兮未酬剪拂之私各處一方兮圖翻米篩之案不期去歲兮聞拋枕子之音吾師雖離生滅兮綱宗奚賴諸徒難忘戀慕兮昕夕攢眉今夫塔建鄧山兮匪缺闍維之炬龕存軀殼兮詎遵囑纍之規且震旦事周兮達磨終歸熊耳曹溪葉落兮大鑑仍返新州然師之質可拘兮而神不可測壽可量兮而法不可窮青山重重碧水溶溶梅花滿塢霜雪盈空以有窮之物供無窮之法亦徒然哉惟冀我和尚再來法輪再轉永津濁世永朗禪釭庶某等重受莂于耆闍共傳衣於多子是大快也不罄遐思祈垂洞鑒尚饗祭衣鉢塔文在興化蓮山伏以道用無方兮由遇緣而垂跡法身無相兮憑印物以現形佛佛傳持百代之金襴不毀團團托出一線之祖脈弘通蓋自雞足遲留惟龍華以有待黃梅紛競豈甲胄而能擔然而舍利遂求僅人天之福澤曹溪密授重道法于鼎彝從記莂于靈山誰謂無聞可進脫範模於多子何嘗遍界難藏是以我和尚全軀乍葬於鄧蔚猶存少林之履衣鉢今韜于蓮嶠同追雙樹之思況乎師之聲震于寰區師之機利于鋒鏑綱宗暢其丕振尊宿皆欽濟道賴其中興英靈遠湊某等辱為附驥之蠅才匪千里效展描真之手面見盤山茲者節屆陽春東籬錦吐功圓寶塔萬象眉楊特拈數片兜樓恪獻一心蘋藻設最後之供酬莫報之恩伏祈本地弗忘載奏歸來之調慈風轉播光臨化育之天量廓虛空納禪悅於隨豐隨儉靈妥營宅煥溪山於即色即聲偈奉答金粟百和尚寄示韻昔日追風歎馬駒幾遭騰踏任先驅三秋執役心成鐵半夜渡舟月印湖師道南來雖未振剎竿高豎豈愁扶欲酬千里浪傳句窮到玄沙紙也無與若海深西堂既廓頂門眼祖風可振揚昔年同立雪異日遠飄香脊豎支天骨胸餘濟世糧臨機全殺活吾道自然彰與知幻爾上座截斷千差路現身萬象中既諳今日病須有古人風煨芋忘形世誅茆罵祖翁倘能如是用不愧續吾宗與霜劍玫上座久跨征鞍著戰袍龍蛇陳裏逞英豪錦標奪卻翻身去豈但連城價倍高得雖易兮守還難突出頭來始好看大用臨機全殺活倚天霜劍逼人寒與天懷本上座實修實證離差忒無悟無迷更險巇個裡洞明正法眼接人一著在臨機我今展出開籠手萬里長空任爾飛與石憨瑩上座遍歷諸方眼空佛祖明辨端倪捏碎今古休去歇去未為丈夫赤體荷擔豈云莽鹵沖霄氣宇自昂崇莫報之冤任爾訴與若靜禪上座丈夫期出世行履別風塵久習淘教淨新鋒發更神力扶無底鉢明驗過關人一語因符契丁寧共採薪與默山演上座住海潮汪洋萬里望澄清時聳蜃樓噉福城車馬勞勞行不到長江一艇任君撐與心澄清維那嚼碎楊岐栗棘蓬橫身保社振宗風既知佛法無多子春到孤山花自紅與雪英中上座馳驅數載弼宗風正眼廓開八面通時至別豫千里外一條拄杖活如龍無固必任西東棲賢原是住山翁與朋桐皇知客清操妙行類群賢矢志遍參亦有年祖印無文何處覓梧桐枝上月高懸寄儀部小眉林居士拋卻凡胎養聖胎空花褪即覺花開誰家途路無虧缺須信斯身是再來與聖壽慧嚴定上座參遍諸方廓頂門摩醯隻眼豎乾坤于今正好居林下高視雲霄謾出群羽毛備湖海尊信手掀翻大法輪與龍華自牧謙上座戒品初登脫布毛犀牛戴角出洪濤且自純淘無點疵曹溪路上逞英豪須永鋭莫辭勞峰頭駕艇要幫篙石鏗年上座固守封疆未足猛衝鋒破陳始為雄騰騰施出驚群作赤手吞栗棘吐霓虹烈漢為人自不同十可行行腳木人拈起似獰龍水脈淺深一探中那管青山高兀突當頭踏斷萬千重宴坐溪邊林下結跏身無去無來自在人莫謂文殊難出定罔明彈指亦勞神經行腳跟在處自優游佛殿禪堂漫去留拄杖等閒輕一卓毗盧腦蓋血鮮流入室未入門來已納輸寧容進步擬何如頂𩕳具辦龍蛇眼湖海禪和枉掠虛掃地謾云拂拭費工夫拾得家風付誰扶明眼衲僧遭污染皆因認著本來無應鉢行行鴈陳共開單粒米莖齏任飽餐休學毗耶老病者借來香飯塞饑瘢浣衣破衲多年蕩轉新免將汗氣污他人提持笑卻曹溪叟今古阿誰裸度春誦經一字入門病轉深琅𪻱未展已先臨渾身演出如來藏句句全提示古今普請長鯨震處兩相呼古策風高滿路途運水搬柴須著力草鞋踏破嘴盧都禮拜晨昏叉手向金容得意忘言在己躬謾道玄沙太饒舌洪波近處有蟠龍寄雲莊知浴草年操履絶纖塵輔弼宗風任苦辛況復居山符本色春來徑發一枝新贈復白禪德脫白久經霜雪春出塵鵬鶴邁群倫即心清淨誰堪比笑指長空月一輪學仁書記蓋茆養親勗之堆山文字似傳神無影無傳更逼真種芋養親雖盡意何如現出那吒身區區蓋頂剪莖茅緑野青山作故交杓柄溪邊尋得著乘時掬水灌茄匏示鏡如庵主出塵容易入廛難作用須如水下灘好手龍蛇同捉敗見聞自是骨毛寒贈心光副寺爍爍靈光不用尋非佛非物亦非心楊岐以此為燈盞照古原來也照今百山開爐從來鼻孔日遼天雲月溪山任倒眠堪笑村翁猶未徹卻將斷索把牛穿贈獻可禪人祝髮選佛場中誰最長天然名姓又重香殿前莖草輕刪削腦後圓光遍界彰贈蓮如師啓關蓮花國裏孰相如畫地為牢三載餘百匝千重輕打透十方世界一籧篨撐開正眼乾坤淨透脫全身海宇寬大用現前活潑潑分明秪在一毫端示實光道人靈山女子佛難窺靈照也曾賣竹篱化得紅塵成白雪不須臨鏡畫蛾眉聞桂巖頭秋桂忽然開無位真人笑滿腮不是晦堂饒寸舌幾乎山谷自生埋送雲崖上座回獅子巖誰家養得克家兒惡虎獰龍亦被欺何不遙招金地手卻來籌幄豎降旗贈別峰禪人參方才脫鬚眉便不常眼空佛祖探諸方德山參見龍潭後倒跨牯牛出法堂壽師祖東林禪師三萬日輪月一千春秋不息頂𩕳旋絲絲螺髮從教百壽量何曾有變遷示林明曩居士病中風火不調時鬥戰未空七大奈伊何維摩榻上翻身轉猶怪醫玉藥太多留密行侍者丈夫氣宇自高強正好冤仇結一場莫似投棲林下鳥彈弓未舉先飛揚千佛期齊單僧求無蓋鉢盂口向天三千諸佛共垂涎醍醐上味誰家少牧女香糜好獻先示慧頂披剃割愛雖然是丈夫恢弘大法始良圖拶開佛性無南北午夜傳衣恰老盧示朱漢卿居士老來奮志欲參禪纍叩孤山四月天悟得渾身皆是喝好將困馬痛加鞭余傳芳居士誦蓮經求偈如來不說最幽玄諸法空無一法傳門外三車輕擊碎滿盤托出任君宣開眸豁見燈明光歸子嬴身沒處藏一會儼然勘破孑莫教辜負法中王示月如柯道人倚天長劍白如霜截斷萬緣體法王好手鏡臺高揭起不須拂拭自風光寒來暑往獨惺惺永向閨門作典型劫外曇花重發瑞誰云遍界不聞馨示姚際瑤道人節操堅持比白圭老猶學道謐深閨一生受用何為貴好悟自心與佛齊挽也懶禪師數年盤谷揚家醜為法忘軀泛海東渡葦翻聞攜履信滹沱一胍遠流通別雪庵諸居士骨格天然異類畜踢踏緑叢水草足臨行哮吼欲何為冀君共和陽春曲集同門造先和尚塔臨濟堂堂正法眼無端滅卻瞎驢邊雖無縫罅堪尋覓總要吾曹著力先贈傑庵賀居士舉案雙修不染塵占為天地一閒人君看芳草嘶金勒爭似無糧野鶴身贈厲會庵居士揮鞭馬上力參禪斬盡魔軍血濺天何日鵰弓高掛壁與君長見太平年挽石堂耆舊卓錫座山德臘尊戒珠朗耀照禪門翻身踏斷無生路驚起泥牛海底奔林邦欽老者乞偈以預往生佛性人人知本有平生立志護山門他年就地翻身去八德池中必見君莫憂戚須勤薰尊榮貧賤等浮雲為明曩林道友對靈撥開愛網脫塵韁撲鼻蓮花覿面香迷悟二途俱坐斷巍巍壽量越彭殤示善人何曾佛法離紅塵塵裡拶開金栗身莫謂相逢多不識眉毛八字自尖新壽良忍禪德水牯山中共歲年昂藏頭角插雲煙隨收隨放無拘束幾變滄桑體自然銀河倒瀉秋色高懸明明父母未生前示徹微禪人昔年何事謝青山鐵脊須撐霜雪間三腳驢兒騎得著陽陽勝掛錦衣還示玄湛禪人黃犢養來力氣全溪南溪北任遼天莫將蹄魚塢孤負祖翁一片田佛誕示諸禪友頂天立地偉男兒脫體風流徹四維若謂今朝方出世現前蹉過幾多時示明詢林信童煙水南詢五十三圓通門戶不須參鴉鳴雀噪自家底為要善財力荷擔示雲淡禪人雄雄年少懶安邦放下剛刀輔法幢萬里無雲天似水一輪明月印長空贈自品禪士衲僧品藻自和融高隱樓臺趣莫窮翠竹蒼松培多少相尋試問住山翁示女僧思修西來祖意最幽玄渴飲饑餐要了然果得胸中空萬有逢人任說老婆禪慈修禪人求示性本如如不假修頂天立地迥常流禪人若也達斯旨林下溪邊得自由示實和道人本色道人截悟迷久長研究羡深閨試看龍女獻珠處七歲已登佛祖梯步六觀林居士讀蓮經韻堂皇何處不圓成黃面無端設化城駕動高車牛似雪掀翻朽宅火如晶掌中托出皆龍女衣裡拈來是酒氓謾道為憐窮子切門前荊棘太多生贈淨慈社居士二偈社創虎溪始大儒聖凡跡盡體如如詩囊不貯長生藥芥子能藏萬卷書靜坐高堂天似水默持半偈月凌虛更期信手開金鎖鑿壁工夫漸掃除四海鯤鯨不可窮亙今遊戲在其中隋侯豈望含珠答宋子全忘載蟻功一善不彰虧至化萬機頓息賴神鋒當年我亦從斯過線路與君特地通佛日答十華黃居士弗生亦弗滅休問日兼時大地誰如佛普天盡小兒欣然摩海墨信手和君詩毫端忽舉處了無一字之示石譜禪人特地求吾示吾何以示君悟迷宜自拭山水謾相分操比嚴霜潔遊尋野鶴群禪關擊碎後枕石伴閒雲石獅子千錐萬琢露全身踞坐當軒孰敢親未動爪牙先破膽何須哮吼始驚人示慧亙禪人切切切生死關頭打得徹饑餐渴飲度雲峰莫謂洪爐皆鈍鐵諸禪者有掬水弄花之作以此示之勺水捧來量不窮澄澄也可隱魚龍豈惟良夜臨明月萬象森羅一掌中當陽拈出笑洋洋無影枝頭撲鼻香怪卻瞿曇輕賣弄至今遍界不能藏挽余母梁氏老宜人萬象森羅一鏡收百年鶴髮化東流堂前忠孝雙雙列不必西方心外求黃超成居士求偈結社真如面目遍塵寰緇素同參向上關蘇嚕一杯花一朵是真供養古靈山光陰速修證難不似偷閒半日間贈崑崙巖大稟禪德徑上崑崙探老僧孤峰亙古翠崚嶒問渠仁壽高多少笑答乾坤剖未曾示徒雲羲披剃洪荒覷破似浮漚擇友尋師是大謀時節到來承滴水昂昂突出化龍頭贈聖壽寺慧嚴禪人聖人壽量本無疆流水高山古道場個裏聊通一線路荔奴千樹倚斜陽示雪然禪人見見之時非是見本來正眼露堂堂那吒骨肉休分折晝夜無雲月未央募衣單僧求翻轉遊囊徹底空採無荷葉補秋風幻軀未解逃寒暑所以剪裁藉志公示惟一沙彌生身父母歸何處五尺零丁寄法門大事不將時苦究茫茫愁殺兩親魂寄禪人女子浣沙少少哉河邊非水動人猜出頭便是無心本須用兩人將木抬薦牛耕空田地疾如風數載山門積苦功蹄角皮毛脫落盡翻身直出水雲中攢火廛中即事破灶冷青煙鄰家尚未起一擊火星飛元來在石裡得薪青山何不住自析入紅塵寒灰重發焰調燮一閒人汲水上下一貫通卷舒不斷絶漆桶忽放光圓滿一輪月烹茶江心不可得得之成遠涉白雪沸紅煙空階拾落葉送米從來不外求教爾自然至鉢盂口向天龍蛇同一致買蔬共喫一莖齏謾云價如桂雖不種匏瓜尚有閒田地閉戶喧寂不干關豈是避聲色借問扣扉人相識不相識展書古人何所見言言皆心血指顧自分明教我如何說話客胸中無隻字口角費狂瀾鳥啼花笑裏明月映闌干擊磬不入喧囂耳疏敲花雨邊樓臺人睡盡錚錚遏管絃焚香一縷浮煙白韻致向何來可中真消息付與梅花猜燃燈銀碗滿盛雪也須用火試心頭忽放光始知真授記與師伯林居士參禪貴直截不可存分別十聖與三賢俱是眼中屑參禪莫著佛著佛便是禍透脫萬重關長伸兩腳臥參禪忽徹悟靈機隨處長花飛閣外香水漱石頭響寄語參禪士葛藤莫扳扯若向途中求孤負自家底示般舟維那欲渡生死海須翻般若舟腳跟浮逼逼到處自風流贈寄生悅衆石筍抽條蚤尖新欲刺人不辭培養力異日自成林示僧言行宜無疵參尋貴作家清風下載後坐地看飛花座山禮正覺祖師無塵塔覿面超今古巍巍不可攀一年登一度空掃無塵山松花侵徑郁梅子隔溪黃祖意無人會摳衣各自忙示祖風禪人既入如來室須參向上人拋除舊骨董振頓懶精神盧老長春石天童獨採薪焚香原大用掃地現全身鬚髮為誰落皮膚豈我親無多西祖意流播遍風塵答叔子唐徵士見訪韻教外傳無元字腳寧容毫髮起猜疑知君深造彬彬地曾與空王重畫眉空王之相無眼耳認著依然還不是清風明月露全機現前受用奚窮已可憐世界擾紛紛誰似採薇獨閉門即此不須圖作佛溪山無口任稱尊黃鳥喃喃春已老為尋高士踏芳草傾心談到月明初不問落花掃未掃題林門俞氏親繡普門品哲哉媛人能作佛事塵不染塵類不相類盤裡明珠璞中美璲一卷蓮經千生囑纍誦憶弗忘見聞多愧匹素為箋金針是刺千縷千言一心一字隨類現身線路中現前說法豎青幟大悲救苦遍指端羅紋結角無人識琅𪻱熠熠亙古今閨門幻出如來使佛日示心宗禪人閉關昔年黃面老此日設奇關巍巍猶壁立人天不敢扳世有傑中傑豈無山上山卻為韶陽老推倒似等閒此關破已久子今又活埋將錯而就錯撞入此中來行住與坐臥事事絶安排破戶不須閉虛窗竟日開掀翻黃面爛公案掃蕩韶陽舊禍胎百匝千重跳得出石人撫掌笑咍咍和韻復洎庵唐居士古來學道人一片心如鐵跳出是非關飲乾賢聖血龜毛信手拈檀樹和根折況復老維摩桑榆逼眉睫鴻鵠翥沖霄肯為藕絲紲自性等虛空終始無生滅何日見桃花從人話未徹示廓然禪者披剃黃面老瞿曇貪心欲作佛棄國舍世榮睹星始行乞為法不為身先作而後述咄哉小廝兒出家志不屈見聞與覺知此家如何出掀倒鸚鵡洲擊碎毗盧骨天上及人間明明是何物不是達摩禪亦非波離律大事一廓然須彌山嵂崒贈林超壽明智姊妹同修祖師心印鐵牛機迢迢傳入大唐國獲證菩提如稻麻夙根深種羡閨閣仁者壽智者樂萬里長空翔獨鶴繡佛堂前截塵囂數聲清磬通寥廓我憶當年秦國太熠熠琅𪻱勤頂戴就中契悟本來人溫故知新無滯礙我憶空室參黃龍拶透玄關機峻雄無陰陽地輕拈出一花五葉影重重道人同氣復同修不造古人志不休但得萬年一念去長江皎皎月臨秋雜詠上同十華黃居士及諸禪者登囊山辟支巖用淡軒林先生虎去尚留溪句為倡各賦四律虎去尚留溪溪深路轉迷山容蒼藹宿石縱古人題萬籟沉巖壑千峰繞杖藜未成麴社結杯茗坐高低虎去尚留溪奇蹤約我躋企橋陪水笑倚樹伴雲棲升斗村村屋牛羊井井畦辟支高隱處巖戶闢雙磬虎去尚留溪山高孰與齊僧無凡聖別人自廢興悽嫩草香堪佩奇巒獨可棲尋幽招隱者摘葉欲分題虎去尚留溪春深鳥競啼煙囊鐘磬渺天接海濤低閲世渾圖畫休官勝隱栖未忘還路思振羽度庵西附鳳巖坐雨淙淙聲愈震山色晦如無牆角斜楊柳松陰睡鷓鴣椎窗驚旭晚臨水笑形孤不必王維手全身在畫圖訪賢谷居士次韻留雲敦掃榻停午靜聞雞戶外何山好秋深萬壑凄催梅香雪裡結社近巖西適意尋殘葉揮毫續舊題柘浦訪柯臣班居士寓居家園千里外一笑付風塵未得江淹夢深嘗原憲貧望雲依遠堞鑿壁度長春老我欣奇遇徘徊懶泛津秋海棠不受煙霞染嬌姿出自然清新微帶醉瀟灑幾成顛緑掃炎威減香飛秋色先溪山培植久朵朵占高懸龍華集雨示自牧侍者昕夕從談吐知心何所聞炎天宜沛澤古剎快風雲柳線柂煙溼荷盤瀉玉紛揚眉庭際看盡是化龍群荔月從西明歸雲峰徘徊離古寺禪侶亢朝霞半世全為客還山漫作家炎途原可畏高木不嫌奢誰道乾坤闊東方日又斜再登紫霄巖訪許又米居士不遇徙倚松陰下喈喈僅鳥聲一溪花雨燦千樹夕陽平石險無人伴雲高獨自行不忘玄度約支杖復登崢睡燕繚繞將云晚尋花入舊巢梁高同寂寂月白息交交飛跡空中沒歸心夢裡拋天涯誰是主四海任波濤登東山巖訪別庵法姪萬仞無人到峰高特遠攀新苔浮緑砌宿雨沒青山懸室一燈皎衣荷百慮刪道衰宜共振未許永安閒遊中和寺尋芳由僻徑蘭若獨幽然竹發撐天筍池香出水蓮蕉庭飄緑羽松塢織青煙我愛買山酷恨無支遁錢贈本源禪宿返鳳山憶別雖多載老來骨更堅道交忘齒臘機辦敵英賢因喫座山棒故安蓮灶禪分明如駿驥回首不須鞭過永慶寺訪念宗道友十畝風塵外松關午未開雲生兩岸石雪泛一溪梅面壁圖何事翻經見幾回我因尋衲叟腳下路紆回到杭州偶成倏爾臨吳地始知共碧天輕舟雲出岫遠岸樹流煙野徑千弓按湖光一鏡懸不因探水脈爭費草鞋錢暮雨蟬聲哽咽天將暝淋漓入半秋韻新聞古樹山靜隱清流高潔無人識吟歌適意遊不知同調者風露若為酬仙溪路上不忘嶮峻路躡足入深秋興廢憐丘土浮沉寄扁舟巖高香有桂樹怪老成虯自是山中好白雲伴去留登鳴峰巖誰家閒隻艇千載繫林皋秋織一山錦風生十里濤老僧猶在定古樹未辭高我到衝寒際霜花郁布袍送林十叟居士往新樂省兄凝山邑宰長安何處是極目盡江山師友分襟易煙霞得句閒書雲才擁道鞭影漸衝關元季如相見文章細論還登友可山訪鐵容禪師不獨山如友知音自可人瞻風登嶺峻晤而發機新幽徑桃花蚤寒巖雪雨頻盤桓忘晝永天際碧粼粼宿金沙師子巖正覺禪師遺跡古人何所慕撥草上巃嵷修竹凌空翠落花織徑紅玉泉微灌頂龍樹靜遺風卓爾渾吾道不勞神斧功木末懸孤剎石門古不封車輿遊自罕鹿豕睡惟濃樹宿銜花鳥雲親蓋世松我來閒極目山水秀重重福嚴寺偶成粒粟藏樓閣清光一望遙林培插漢樹門鎖勸農橋鼉鼓喧桑梓禪風震海潮途中未返客徒與隔江招仙溪訪妙門居士道交原不淺遠扣悵無由天下成仙窟山中遁世秋空潭千樹老野色一笻收際此休彈瑟峰高水自流座山芍藥初開嚼盡彤霞色新馨播遠風秀宜深處發神向媚中通含笑醫群物流輝賽曉瞳依稀蓮出水春占一枝紅聞鶯兀坐松窗下倏生睍睆音如簧嬌獨奏同調遠相尋多羡錦衣貴誰追喬木深須臾三五囀引起惜春心黃改庵十華余季蘆諸老居士過穀城看梅留宿通天寺賦詩索和因次之凜凜衝寒際花飛占穀城千家春信早十里夢魂清踏雪天留晚尋香月送晴空山憑嘯傲刻燭愧難成寒梢繁噴玉僻徑燦鋪茵清白同高士蕭疏象野人談心分半榻結社集西鄰不盡村中酒深宵促飲頻十一夜玩月良宵春浩浩明鏡半高懸照世休嫌冷留人不在圓光清分雪瑩質素助梅妍嬴得天如晝相依猶未眠偕石竺同門康君平居士遊漁滄溪路入春山暮飛花逼袖香漁樵分動靜畎畝雜青黃橋鎖溪千里僧居水一方偶因尋勝概徙倚話松篁次君十林居士見訪韻山靜無人到君胡獨扣扉涼階展席坐素手帶雲歸作客家如在摶空鳥謾飛極眸風景外自不涉離微遊智泉同康君平居士奇勝尋何處紆回一線荒到山知嶮峻觀水憶滄浪殘局遺仙子芳菲沒草堂遊人不忍去朝市自相忘秋過國歡寺逢姚子于林獻十居士自笑耽遊覽蹉跎已白頭寺青千樹鎖門碧一溪流立雪風猶在臥雲山更幽況逢聞道客倚杖話深秋同月川禪師別庵法姪過附鳳巖款款扳禪叟紆回一徑深群峰閒入戶夾漈遠聞音水映山花亮煙含鳥語沉個中渾太古樂我每相尋除夕前一日再過九峰不逐尋春隊焦庵到幾回山深忘歲晚僧老為梅催寒色生丘壑晴光自去來蕭蕭溪畔柳碧眼幾時開九日書懷時節易遷換人情謾嘆嗟道貧疏故友園瘦罕黃花看樹驚秋老登山信路斜不知彭澤令今日醉誰家通天度歲吾生無定止隨處寄孤蹤憶掃侵階雪翻聞送客鐘探春猶一夕燒燭盡三冬際此誰堪侶梅花越樣丰龍華退席昔值黃花放泛槎上寶幢風翻松竹翠月帶水雲淙種火娛烹雪移藜想渡江道情何所適兩地燦秋釭十六夜玩月清光猶未減此夜欲精神古樹疏沉影長空冷照人一輪湖海望八表林巒新相對忘歸思臨流擬結鄰癸亥孟冬付暗然晐監院處處輔法幢步步踏實地晚景忽翻身雲有出山勢振頓舊乾坤始堪稱祖裔我有拄杖子久荷要人替付愧斯任上座丙寅孟春如水傳器火傳薪豈是超宗異目人返躑獅兒牙爪備險崖平地任翻身與光嚴持維那住山丙寅仲春古德住山刀耕火種鶉羽為衣松花作供苟能若斯奚慮不中佛祖爪牙有擒有縱拈起龜毛擊碎齏甕花笑鳥啼水流風動一段真機當人受用我不再三爾須自重
