body:
  text: 嗣法門人性深等編示衆專使傳衣至師拜受畢提起衣角示衆云雲開月朗水漲船高昔日大庾嶺頭提掇不起今朝三千里外特地傳來且道還有優劣也無遂放下衣角云莫怪渠儂多意氣他家曾謁聖明君中元圓期示衆諸方三月安居蓮山無居可安諸方今日解制蓮山無制可解無制可解而盡日解制無居可安而長年安居去者隨去住者隨住個個如戲遊師子人人似脫網金鱗倘悟得如是受用如是解脫不但此生父母度竟至於多生父母大地怨親悉已超拔矣間有一二或報身於水火或償債於刀鎗總不出毗盧性海當恁麼時擲華藏世界於大千界外攝大千世界入一毛孔裏直得善財無處參尋諸大善知識退席有分且道毗盧遮那佛又向什麼處安身立命戴角披毛人不識負鞍銜鐵滿塵寰除夕示衆極目天地間一盤未了局未明一著先徒勞相馳逐任馳逐忽聞爆竹震驚天六六依然三十六何似林下窮道人也無榮也無辱竟日嘴嚧都高唱無聲曲無聲曲既唱個中覓個同拍相應者了不可得雖然素上座寧可獨掌弄鳴終不移高就低何故動絃便落官商調白雪陽春何處無長至示衆古之天地猶今之天地今之日月即古之日月寒暑變遷了無休息陰陽消長理合如然擊拂子云惟此田地千生不動萬劫長存洞山老人掇退果卓慈明遠祖貼榜堂前大似枯櫱再糝花寒灰重發焰諸人會麼即此是諸佛之本源即此是衲僧之慧命今日若承當得去向後也須仔細是事且置因時及節一句又作麼生道日轉南華添一線五雲柂出映三台示衆問如何是道師云龍蛇混雜凡聖交參進云如何是道中人師云面面相睹進云如何是人中境師云門前三匹徑屋角一株松進云人境兩忘時如何師便打乃云欲知佛性義當觀時節因緣時節若至其理自彰況向上一路千聖不傳臨濟德山漏逗不少見僧入門非棒即喝直教個個如獅子兒如白額虎到處咬人家豬狗滅野狐精魅直須恁麼方不愧為瞎驢種草何故彼既丈夫我亦爾誰家無路透長安喝一喝寓中除夕示衆光陰四序急相催薄雪凍開幾樹梅惆悵年窮歲盡際家鄉咫尺不知回蓋緣世路奔馳似日月循環一樣直到臘月三十日始得一場合煞更有貪途忘返白首空嗟惟我衲僧又且不然遇緣即住到處為家所謂有一人常在途中不離家舍有一人不在家舍不在途中阿那個合受人天供養喝一喝云不會作客勞煩主人元夜示衆衲僧行履不尋常城市山林一戲場本有光明渾灼灼何須待月照西廂拍膝一下云大衆向這裏見去猶落二三向未舉之前見得本有光明即同諸佛光明即見山僧三十年前和塵混俗戴月披星以荊棘為家與龍蛇作伍及知有此事入一叢林出一保社忘餐廢寢舍短從長不到山窮水盡而不已至鼻孔被穿之後有時把茅蓋頂有時垂手入廛遇醜女贈他脂粉遇良人脫其汗衫不是調高和寡蓋乎地曠人稀到住此山又是一番光景春鋤一片畬秋收一籮粟吟風嘯月於鳳凰峰頂點魚化龍於姑熟潭頭松竹影高雪霜春重茲逢元夜所扯一段葛藤不出本有光明之外若認作本有光明何異西廂月色喝一喝云若不喝住幾乎又扯葛藤去也示衆云不悟從於不疑小悟從於小疑大悟從於大疑汝諸人倘曾十分息疑任汝東司頭大宜臭桶邊小宜左之右之無所不宜若觸境逢緣尚有狐疑莫學靈雲弄口嘴也道直至如今更不疑命婦董宜人送法衣至師捧衣示衆云大衆見麼即此物非他物功薰曠劫色奪明霞有卷有舒不長不短不是黃梅密授亦非七佛流傳秪從吳門董老宜人信心中拈出壯度人天永沾法澤即今山僧酬謝一句作麼生道老來積善承餘慶多出調羹補袞人遂展除夕示衆云物我如如體遷同不變遷深山忘甲子古寺近村煙風剪林梢葉人歸雪裏天二三貧毳士相伴度殘年不分臨濟賓主不辨曹洞正偏不烹露地牛不唱田家樂大家團圞頭共向無煙火飢餐栗棘蓬渴飲西江水舉頭觸著伊巖梅才破蕊回山示衆昔日出山去草鞋獰似虎今日歸山來山門八字開去去實不去風撼空庭樹來來實不來皓日上蒼階不似百丈再參馬祖豈若豐干遠禮五臺惟一事最奇哉相見盡是舊時人依舊眉毛眼上栽大家重聚首坐地焰寒灰莫辜霜雪裏冷淡一枝梅拈古舉世尊初生拈云世尊出世太平姦賊雲門打殺亂世英雄盡謂以冤報冤殊不知劍去久矣舉世尊拈花示衆時惟迦葉尊者破顏微笑拈云龍行雨致虎嘯風生此事若不是飲光也大難擔荷山僧今日只拈拄杖若有人微笑劈頭便打且道與古人是同是別舉世尊一日升座文殊白椎云諦觀法王法法王法如是世尊便下座拈云世尊升座特地無端文殊白椎互相鈍置殊不知未動步已前落二落三了也何故分明月在梅梢上看到梅梢早已遲舉世尊自恣日文殊三處度夏迦葉白椎擯之而推不能舉拈云文殊度夏好手手中呈好手迦葉白椎紅心心裏中紅心若無世尊證據怎見二大老一場賣俏雖然如是迦葉也欠一著舉女子出定拈云世尊坐賈行商女子賣弄奇貨若無文殊開價怎得罔明還錢這四大老一時虛張直得天下人商量不得且道把柄在阿誰手裏打麵還他州土麥唱歌須是帝鄉人舉須菩提宴坐諸天雨花提云空中雨花者是何人天云我是梵天敬重尊者善説般若提云我般若未嘗説一字天云尊者無説我乃無聞是真説般若拈云善現抱贓叫屈諸天簸土揚塵簡點將來各與三十拄杖何故人平不語水平不流舉文殊問維摩云仁者當説何等是不二法門維摩默然殊云乃至無有語言文字是菩薩不二法門拈云維摩運籌帷幄之中決勝千里之外檢點將來猶欠一著若是越格底人和聲便打不致遭文殊一杓惡水舉忠國師無縫塔拈云國師良久已破一縫代宗不會補得渾全耽源起模畫樣則不無欲夢見無縫塔天地懸殊舉肅宗命忠國師試驗三藏忠問藏云汝得他心通耶藏云不敢忠云汝道老僧即今在什麼處藏云和尚是一國之師何得去西川看競渡云云拈云三藏覓通大似追蹤獵犬國師末著猶如挂角羚羊雖然藏得頭角未免露出尾巴總被他捉敗了也且道甚麼處是捉敗處試檢點看舉鵝湖喫油餈拈云古德喫油餈有失大人之相莊主來謝證龜成鱉侍者若是個人便拍掌笑云將謂將謂元來元來直得這老漢偷心頓息不致諸方傳流話柄舉藥山問雲巖聞汝解弄獅子是否巖云是山云弄得幾出巖云弄得六出山云我亦弄得巖云和尚弄得幾出山云我弄得一出巖云一即六六即一拈云入理深談略許雲巖父子越格提持必須透脫衲僧藥山若是作家待他問師弄得幾出便與踏倒直教它作箇咬人獅子方不愧為人天師範舉王常侍問臨濟云這一堂僧還看經否濟云不看經王云還習禪否濟云不習禪王云畢竟作個什麼濟云總教伊成佛作祖去王云金屑雖貴落眼成翳濟云將謂汝是個俗漢拈云臨濟柂陷虎之機常侍逞屠龍之作二員敵手縱奪驚人若是山僧見他恁麼道便與推出禪堂免見遞相錮鏴舉雲峰悅聞大愚芝云大家相聚喫莖齏若喚作一莖齏墮地獄如箭射悅後大悟云云拈云大愚芝因貪一隻金鱗費卻許多鉤餌雲峰悅從來活潑潑地無端向齏甕裏淹殺雖然漆桶打破蝦跳何曾出斗舉南泉斬貓拈云南泉為衆竭力禍出私門趙州費盡腕頭力只救得一半且道那一半還有人救得麼舉雲門問直歲云甚處來歲云刈茅來門云刈得幾個祖師歲云三百個門云朝打三千暮打八百東家杓柄長西家杓柄短又作麼生歲無語門便打拈云雲門費許多伎倆只打個無尾猢猻帶纍三百個祖師出頭不得今向拂子頭上出出沒沒諸人還見麼若見正好朝打三千暮打八百若也不見與我刈茅去舉興化見同參來才上法堂化便喝參亦喝化又喝參亦又喝化拈棒參又喝化云看這瞎驢猶作主在參擬議化直打下法堂拈云興化按殺活莫邪斬盡龍蛇此僧雖有衝關破陳之能且無斬將奪旗之勇當時見他拈棒便攔胸一頓不惟先下手為強抑且踞虎頭收虎尾舉西堂百丈南泉同侍馬祖玩月拈云大小三古錐被馬駒一拶直得手忙腳亂馬駒雖賞罰分明未免節外生枝何似當時便歸方丈教伊立地疑去自然知恩有日不致後代兒孫向光影裏作活計舉臨濟云大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝諸人作麼生會拈云白拈鋪出一盤棋局為尋格外知音奈乎不逢敵手致至于今分疏不下當時若遇個漢便掀倒禪床云莫魔魅人家男女好不惟啐啄同時抑且有收有放何故家貧生孝子國霸顯謀臣舉鹽官云虛空為鼓須彌為椎什麼人打得南泉聞云王老師不打這破鼓拈云鹽官拋磚引玉得遇知音南泉止響揚聲如雷震耳山僧夾路相逢不但與二大老相見也要今古共聞遂作打鼓勢云諦聽諦聽舉德山到溈山顧視方丈云有麼有麼溈山不顧德云無無便出至門首云也不得草草遂具威儀再入相見才跨門提起坐具云和尚溈擬取拂子德便喝拂袖而出云云拈云按佛祖靈符探諸方邪正不無德嶠奈老漢具頂門隻眼向冷地驗人不妨奇特何似當時見他取拂便作禮云勘破了也管教溈山瓦解冰消陳後興兵不得舉宗演禪師云南泉道十八便解作活計趙州道十八便解破家蕩産演云南泉趙州也是徐六擔板只見一邊華藏也無家可破也無活計可作拈云南泉驅耕夫牛趙州奪飢人食華藏大似街頭窮乞兒風吹日炙無容身之地殊不知衲僧也有活計可為也有家業可破豈不見道時挑野菜和根煮旋折青枝帶葉燒舉僧問雲門如何是清淨法身門云六不收圓悟云一不立拈云雲門知放不知收圓悟知收不知放兩個老古錐各各道一半若問山僧秪向他道三腳驢子弄蹄行舉雪峰見僧禮拜便打僧云某甲未曾問話因何便打峰又打拈云雪峰羊頭狗肉太煞賤賣可惜癡人不識時價致老漢一場失利舉僧參臨濟云拜即是不拜即是濟便喝僧便拜濟云這賊僧云賊賊濟云莫道無事好云云拈云龍蛇易辨衲子難瞞人人盡道這僧被臨濟勘破殊不知白拈被首座捉敗舉芭蕉示衆如人行次忽遇萬丈深坑背後野火來逼兩岸是荊棘林礙卻正當與麼時作麼生免得若免不得墮身死漢拈云芭蕉恁麼道也是蕭何制律舉溈山摘茶次謂仰山曰終日只聞子聲不見子形仰撼茶樹溈云子只得其用不得其體仰云和尚又如何溈良久仰云和尚只得其體不得其用云云拈云把斷要津須還大溈展露鋒芒獨許仰山雖然各具隻眼爭奈話作兩橛若是山僧便云瞎瞎把溈山口挂壁上不致分體分用舉六祖聞一僧對論風幡祖云風幡非動動自心耳拈云望空捉影自埋本地風光因邪打正翻成帶水拖泥若據正令之行祖師也無回避處舉夾山問虎頭云目前無法意在目前不是目前法非耳目而所到頭云今日雖問要且不是山云片月難明非關天地頭云莫豚沸便作掀倒禪床勢云云拈云虎頭逞射日之能穿過鐵限夾山施拔山之力跨倒烏騅雖然若是臨濟兒孫見掀禪床便連棒打出不惟席上增光抑見有賓有主舉乾峰云舉一不得舉二放過一著落在第二雲門云昨日有人從天台來卻往徑山去乾云典座明日不得普請拈云乾峰把斷要津韶陽私通車馬明暗相投不妨奇特且道明日不得普請又作麼生天共白雲曉水和明月流舉凌行婆問浮杯云盡力道不得底句分付阿誰杯云浮杯無剩語婆云未到浮杯不妨疑著云云拈云明鎗易避暗箭難防眨著眼來劍去久矣古今謂浮杯被婆兒扭捏一上殊不知浮杯潑出一杓惡水引得蝦蟆滿地𨁝跳傍僧云和尚是什麼心行師云逢人切莫錯舉舉五祖演拈拄杖云者箇不從天台南嶽得亦不在西天東土且道生在什麼處若知生處同得受用若也不知遂靠卻下座拈云演祖放去太危救來太速我則不然若知生處一任橫拈倒豎若不知明年更有新條在舉趙州問婆子甚處去婆云偷趙州筍去州云忽遇趙州時如何婆便掌州休去拈云趙州平地掘坑陷人不少婆兒若不是久經行陳蔡州幾被打破雖然若到儂家門下直教他倒退千里舉僧到章敬繞敬三匝振錫而立敬云是是其僧又到南泉亦繞三匝振錫而立泉云不是不是此是風力所轉終成敗壞僧云章敬道是和尚何道不是泉云章敬是是汝不是拈云盡道這僧擔個冬瓜印子被南泉一捏百雜碎殊不知南泉被這僧一拶直得撒土撒沙舉大嶽見五祖戒戒云作麼嶽畫一圓相戒云是什麼嶽云胡餅戒云趁爐灶熱更搭一個嶽擬議戒曳杖趁出拈云大嶽獻璞求榮反遭刖足五祖開關破敵勝在焚牛當時縱有減灶之謀亦未免遭他塗炭山僧恁麼道也是輔強不扶弱舉孚上座問晏國師云師兄向甚處去晏云九重城裏去孚云忽遇三軍圍繞時如何晏云他家自有通霄路孚云恁麼則離宮失殿去也晏云何處不稱尊拈云孚上座中途打劫不顧危亡晏國師散宅拋家謾言作者縱然到處稱尊也是徽宗比狩舉馬祖送書與徑山欽欽發緘見一圓相即一點卻封回忠國師聞云欽師猶被馬師惑拈云馬祖垂鉤千里為釣獰龍欽師雖慣入風波未免陷他圈繢當時若見其書便與焚卻不但和贓捉敗且令天下人檢點不得舉南泉上堂趙州問明頭合暗頭合泉便歸方丈州云這和尚被我一問直得無言可對首座云莫道和尚無語好自是上座不會州便掌云此掌合是堂頭老漢喫拈云南泉歸方丈聲震如雷趙州道無語心毒猶蝎若不是首座證據幾乎一場失利秪如劈面便掌又作麼生劍為不平離寶匣藥因救病出金瓶舉黃檗捧鉢向南泉位中坐泉見問長老甚年行道檗云威音王已前泉云猶是王老師兒孫下去云云拈云黃檗不顧危亡深投坑阱若無南泉一釣幾向威音王已前坐殺南泉就窠打劫則不無若非黃檗撥轉鎗旗未免在兒孫階級下站殺檢點將來二俱弄險舉南泉問黃檗定慧等學話拈云黃檗具減灶之謀南泉失超方之眼只顧揚鞭策馬不知身陷重圍當時待檗云不敢便云長老是什麼心行直令黃檗無地藏身舉五祖演初行腳時舉興化打中間話問圓照本本云此是臨濟下事須問他家兒孫演又問浮山遠遠云譬喻三家村裏賣柴漢夯個匾擔向十字街頭問人中書堂今日商量什麼事演不契拈云興化嚇鬼瞞神浮山撥油救火不惟血脈貫通且亦大方獨步圓照老退己讓人也是病久諳藥性舉婆子燒庵拈云婆子探竿在手擬釣獰龍奈這僧似困魚止濼怎解興波當時若是個人直教他如貧得寶頓息偷心檢點將來一場失利舉趙州因一婆子令人送錢請轉藏經州下禪床繞一匝云傳語婆轉藏已竟其人回舉似婆婆云比來請轉全藏如何只轉半藏拈云趙州轉藏文已加點婆子半藏眼裏偏枯素長老恁麼説話也是逆風舉棹試問諸人如何轉得全藏去舉興化謂克賓云汝不久為唱導之師賓云我不入這保社化云會了不入不會不入賓云總不恁麼化云克賓法戰不勝罰饡飯一堂仍須出院云云拈云興化恁麼為人太煞落草克賓荷擔得起也是有力大人諸人還知得力處麼犀因玩月紋生角象被雷驚花入牙舉徑山杲云古人道侍者燒香已成多事大衆問訊轉見病深恁麼説話大似無病著艾捏目生花育王則不然侍者燒香不為分外大衆問訊理合如然若作佛法商量生身墮地獄拈云全收全放則不無爭奈育王只見一邊何故燒香問訊若作世諦流布亦墮地獄如箭畢竟如何展兩手云分身兩處看頌古世尊初生脫殼雞兒毛羽全一聲啼破五更天誰知猶有夜行客卻把恩情反作冤驚天動地逞奇才究竟何會出母胎遍界韓盧皆逐塊雲門大口亦空開世尊升座迦葉白椎云世尊説法竟滿樹花開色正濃東風一掃絶殘香可憐無限遊春客摘葉尋枝空自忙世尊拈花迦葉微笑倒腹傾腸説向君盲龜跛鱉竟何聞巨鰲不避鉤頭餌萬里滄溟一口吞外道問佛不問有言不問無言世尊良久落花鋪滿地明月映西廂啼出杜鵑血佳人暗斷腸文殊普賢起佛見法見被世尊貶向二鐵圍山正令當行嚇小兒瞿曇自是暗相欺青山只解磨今古流水何曾洗是非世尊救産難春風開竹戶夜雨滴花心叵耐瞿曇老令人恨轉深文殊請世尊再轉法輪云云都來擺尾與搖頭半滿偏圓一筆勾秋夜無雲天似水相將攜手上高樓金槨示雙趺長江後浪推前浪世上新人趲舊人四十九年弄不了猶來作祟魅家親臨濟三頓棒三汲浪高起臥龍翻身突出爪牙雄玉樓金殿都推倒萬里無雲鼓黑風經云不汝還者非汝而誰不汝還者非汝誰聲聲杜宇喚人歸殘花無限隨流去依舊青山映落暉經云清淨行者不入涅槃破戒比丘不墮地獄渭北春天樹江東日暮雲一杯清淡酒隨處樂紛紛經云止止不須説我法妙難思深閨美女逞風流半掩柴扉半露頭門外奴郎添怨悵家人呵罵不知羞忽知羞孰同儔家家池內含明月引得笙歌上小樓調達謗佛生身墮地獄礦裏黃金色色真一番煆煉一番新相逢飲罷高歌去君向瀟湘我向秦舍利弗逢月上女云云唐虞世路盡英賢隨去隨來共碧天鶖子命根原不斷一條紅線手中牽城東老母不欲見佛以手掩面至於十指悉皆是佛同條共住不相知一種風流賽國奇到底還他肌骨好懶將煙黛畫蛾眉老婆氣宇自高強不向他家覓短長無奈東君頻漏泄枝枝紅杏挂低墻迦葉云倒卻門前剎竿著剎竿倒卻事重宣呼應相酬豈足傳急水灘頭撈得月誰家灶裏火無煙文殊命善財採藥潦倒文殊七佛師畫蛇添足太無知若將莖草分生殺自病渾身尚未醫世尊滅度僧求頌滅度非滅度當人何契悟金槨示雙趺指天行七步頭也露尾也露崑崙山頂鷹追兔六祖風動幡動隨波逐浪不知羞帶纍傍觀強出頭癢處雖然抓得著渾身泥水動人愁僧問馬祖離四句絶百非滿院芳花次第開枝枝紅紫映樓臺狂蜂不領東君意幾度隨香去復來初祖面壁滯貨珍藏不自甘東頭賣賤抑何堪普天盡是粧聾客九載徒勞話再三馬祖升座百丈捲席太平姦賊平地干戈因風吹火用力不多惹得間神野鬼白日暗裏悲號趙州勘二庵主兩手摩娑日月一身掌握乾坤幾多春色洛陽放謾把枯榮物外分僧問趙州云狗子還有佛性也無州云無角聲暗地冷相呼愁殺長征幾萬夫欲透大同關捩子也須肘後有靈符興化擯克賓膏粱盈席酒盈樽月下花前醉勸君仁義肯從貧處斷殷勤相送出柴門臨濟上堂云有一無位真人常在汝等面門出入未證據者看看時有僧出問云如何是無位真人濟下座搊住云速道速道僧擬議濟托開云無位真人是甚乾屎橛狡徒開口便虛張日向街頭話短長四顧恐遭人勘破急拈蕕草換麝香本師百癡和尚侍金粟師翁次翁問云如何是佛師答云破米篩翁頷之誰家落落古墻傍斜傍株梅飽雪霜倏為春風吹破蕊暗香無處可遮藏凌行婆見浮杯臨鋒誰不逞英雄進退機謀莫可窮縱使波濤翻大海還他深處臥真龍臨濟將遷化云汝等不得滅吾正法眼藏三聖云怎敢滅卻正法眼藏濟云汝作麼生聖便喝濟云誰知正法眼藏向這瞎驢邊滅卻造枷容易卸枷難分手途中淚欲彈敵國家資都蕩盡聞風誰不骨毛寒靈雲悟桃花玄沙道未徹窮兒奇遇喜難申糞草堆頭拾得珍無奈五行猶未願一場富貴落他人壯士欺強不欺弱黃金贈富不贈貧擾擾世途何日靖相逢盡是帶刀人女子出定雙雙戰馬出轅門劍戟叢中建丕勳破陳衝鋒推猛烈埋兵誰識老將軍百丈野狐左邊鬱壘右神荼一樣桃神兩扇糊多少外邊之繞漢青天白日暗悲呼莫悲呼打破牢關徹底無臨濟兩堂下喝無多佛法許誰參賓主歷然喝喝間個裏撥開泥水路倚天長劍逼人寒僧問趙州云如何是趙州州云東門西門南門北門東門西門南北門蝸牛角上現乾坤分明指出如弦直何事空山戀白雲德山托鉢低首歸來月滿天相逢知己共連顛雞鳴犬吠沿街鬧惱亂人間不得眠首山新婦騎驢阿家牽新婦騎驢阿家牽家舍路途任倒顛無傍觀撫掌笑家聲不值半文錢仰山説夢白日青天似放憨夢中説夢太無端面門從此遭塗污直到于今尚未乾僧問天童密和尚如何是三寶密云一餐胡餅兩餐粥大洋海底紅塵起太白峰頭波浪生蕩蕩一條官驛路古今曾見幾人行鳥窠吹布毛拈起布毛信口吹伶俜窮子便知歸不因連纍䈁辛苦一片風光付與誰僧問令遵云如何是有漏遵云箍籬如何是無漏遵云木杓云云阿魏無真黃金無假得人一牛還人一馬臨濟掀德山禪床海門才涌千尋浪平地便摧萬仞山豈只魚龍生怖畏雷轟電掣逼人寒汾陽十智同真巍巍坐斷萬重關南北東西絶往還笑殺東村王大姐殘花斜插滿雲鬟僧問米湖從上諸聖還達真正理否湖云達云云從上聖賢達正理如何把臂尚迷津潑油救火渾間事雪上加霜愁殺人南泉斬貓橫按莫耶行正令兩堂雲水盡橫尸猙獰牙爪重伸出匝匝腥風播四維婆子燒庵假粧窈窕探風流爐炭鑊湯得自由枯木枝頭施點火叢林烈焰熾千秋百丈再參馬祖月轉星隨夜正妍虛空變動電交穿一聲霹靂搖山嶽脫殼烏龜飛上天南嶽讓因石頭問云不慕諸聖不重己靈時如何讓云子問太高生何不向下問頭云寧可永劫受沉淪不從諸聖求解脫讓便休金鱗鼓浪向滄洲冷地漁翁試曲鉤謾道羅籠不肯住還他突出化龍頭僧問三角總印云如何是三寶印云禾豆麥僧云不會印云大衆欣然奉持聽事不真卻更真百千變化釋迦身雖然滋味無多子未動喉嚨飽殺人僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤七斤衫子出青州惱亂春風卒未休天上有星皆拱北人間無水不東流法華舉訪琅琊覺賓奪主兮主奪賓當鋒敗北更愁人相逢謾道不相識鬼祟從來魁全親趙州洗鉢盂喫了教伊洗鉢盂天然不用巧工夫世間除卻王維手誰寫輞川入畫圖趙州勘破婆子臺山路上絶岧嶢多少行人被舌搖不是久經行陳者何能一箭落雙雕丹霞問國師侍者珠回玉轉人皆見惡水澆頭那箇知不是南陽親捉敗幾乎羅國過鷂兒國師三喚侍者鶯啼鵲噪媚風光幾度枝頭和管簧音韻高低誰聽得許多岐路泣亡羊大顛打首座奪肘後符拔眼中屑父子不傳神仙祕訣南院顒上堂云赤肉團上壁立千仞僧便問赤肉團上壁立千仞豈不是和尚語院云是僧便掀倒禪床院云你看這瞎漢亂做僧擬議院便打趁出院青天捉賊只憑贓暗架神弓不易防總是貪杯逢醉客瞇攜手上高岡五祖演云釋迦彌勒猶是他奴且道他是阿誰他是阿誰諸佛不識一線傍通攔腮劈脊趙州庭前柏樹子庭前柏樹子千古落人間易會西來意難通趙老關急似箭峻如山拶著通身都是眼依然白日被他暪北禪烹牛分歲生涯誰作罪誰招蹄角納來款款消盡道門哀多引鬼焉知家富小兒驕趙州因秀士問佛不違衆生願是否州云是士云某甲欲求和尚手中杖得否州云君子不奪人所好士云我不是君子州云我亦不是佛入水求魚不得魚是龍項下豈無珠一因完璧歸邦後列國王侯懼相如廓侍者問德山從上諸聖向什麼處去山云作麼作麼廓云敕點飛龍馬跛鱉出頭來山休去街頭接嘴數如麻慣討便宜老作家收拾絲綸歸去也從教井底跳蝦蟆高峰落枕子一聲轟霹靂平地猛翻身舉頭天外看誰是我般人僧問洞山道本無言如何理論山云十里鼓胸中藏甲胄舌上起風雷取得樓蘭首渾身帶血回麻谷參慧忠國師繞禪床三匝振錫而立忠云汝既如是吾亦如是谷又振錫一下忠叱云這野狐精出去投刺逢知己披襟趁好風杯中任笑罵醉後各西東德山招手高亭橫趨追風駿馬迅如雷才見揚鞭挽不回萬里重雲輕一突銀山鐵壁盡成灰汾陽三句嘉州打大像古今為榜樣一鎚落頂門火星烈霄漢陝府灌鐵牛千差一併收舉頭天外看孰是我同儔西河弄獅子氣宇自超群踞地一聲震直教海嶽昏曹山三種墮橫身宇宙自風流氣格分明異衆儔秦國不收漢不管任他呼馬與呼牛春林野鳥如簧囀深院芳花似錦飛遊子何妨裏過古今曾見孰忘歸獨據巍巍萬乘尊未容經緯探高門禁宮寞寞生青草誰敢當陽犯聖君僧問五祖演云如何是臨濟下事演云忤逆聞雷如何是雲門下事云紅旗閃爍如何是曹洞下事云馳書不到家如何是溈仰下事云斷碑橫古路如何是法眼下事云巡人犯夜忤逆聞雷膽自寒普天匝地黑漫漫男兒未具超方作鐵眼銅睛也被瞞紅旗閃爍萬軍中戰馬嘶時將帥雄胡餅雖然超佛祖也成飯後擊洪鐘千里馳書不到家倚門傍戶事如麻一槌擊碎軒轅鏡滿地紛紛盡落花隱隱斷碑古路橫瞎驢腳下禍重生鶤鵬早已衝霄去不向黧奴行處行巡人犯夜屈難伸捉賊元來作賊人認著依然還不是可憐大地盡家珍戀窟委蛇未化龍喫泥喫土卒難窮巨靈抬手無多子劈破華山作幾重臨濟四人境奪境不奪人嬌粧倩女錦鋪茵倏然猛火連天焰畫棟雕梁化作塵奪人不奪境玉樓醉客猶未醒江南三月鷓鴣天行行墜入琉璃井人境兩俱奪江山滿目盡塗抹將軍陳裏血漂尸説甚天高與地闊人境俱不奪十字街頭鬧聒聒斗酒擔來賀弄璋同賞春園花百發四賓主賓中賓不蓄錙銖蓋世貧竟日波波門外走泥團拈弄作家珍賓中主掃蕩胡言與漢語家舍路途俱不居草鞋踏破絶儔侶主中賓月明簾外探疏親傍敲正打憑誰力泥水渾身愁殺人主中主正令全提殺佛祖千手大悲沒處摸驪龍折角向誰訴十牛頌和千巖長禪師韻尋牛遍無蹤迹可窮尋幾度驅馳入淺深錯在最初忘管帶今於岐路費沉吟見迹泥雲懸問似無多聞見之中是甚麼惟要主人高著眼蹄蹄相踩豈非他見牛偶向稠叢震一聲磨牙嚼盡萬山青雖然頭角無殊別任是戴嵩畫不成得牛從來得失總山渠恨為狂心未了除貫索于今常在手他山故國恣安居牧牛晨昏水草足延身高臥山中不染塵驀鼻拽回猶費力三千八百更愁人騎牛到家耕犁卸卻望誰家咫尺逍遙過落霞牧笛一聲天地晚欄無四壁可藏牙忘牛存人幾回叉手對青山牛去山空得自間放下竹鞭隨飲啄一身落落水雲間人牛俱忘無多家業蕩然空破屋蕭蕭八面通極目滄桑無寸土風前月下絶行蹤返本還源水盡山窮亦費功當人本體自盲聾翻身直出乾坤外夾岸桃花笑日紅入廛垂手拖泥帶水去還來鬧匝誑呈驢馬腮明眼衲僧猶不識知音一見笑顏開洞山五位正中偏嫦娥懷玉兔隱隱漸離雲表裏時相照團團光影分偏中正華堂歸白首注意奉晨昏不見阿爺面依依懶出門兼中至朝中天子貴林下道人高狹路相逢際交談意氣豪兼中到鳳輦回宮後簪纓盡退朝御街人寂寂星斗燦中霄正中來御服皆更換素身出九重山河憑獨步不待百王從代古藥山問僧甚處來僧云湖南來山云洞庭湖水滿也未僧云未山云許多時雨水因甚未滿僧無語代云滿即浸倒藥山僧參趙州謂州曰某甲從長安來橫擔一條拄杖不曾撥著一人州云自是大德拄杖短僧無對代一掌云今日放過不得南泉圓寂陸大夫至院主問大夫何不哭先師陸云院主道得即哭主無對代云大夫不可忘卻雪峰問座主云如是兩字盡是科作麼生是本文主無對代叉手云疑殺阿難師兄有僧問訊南泉叉手而立泉云太俗生僧便合掌泉云太僧生僧無對代云老老大大分別不少龐居士訪大梅常禪師相見便問久嚮大梅未審梅子熟也未常云熟也你向何處下口士云百雜碎常云還我核子來士無對代云待老夫與你屙出僧問魯祖禪師如何是不言言祖云你口在甚麼處僧云無口祖云將甚麼喫飯僧無對代云問取貪嘴阿師夾山問華林禪師云遠聞和尚念觀音是否林云然山云騎卻頭時如何林云出頭即從你騎不出頭騎個甚麼山無對代云總遭跨下南泉問維那今日普請作甚麼那云拽磨泉云磨從你拽不得動著中心樹子那無對代云動也動也睦州問僧近離甚處僧云江西州云踏破多少草鞋僧無對代云從來赤腳走
