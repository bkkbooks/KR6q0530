body:
  text: 蓮峰和尚語録序泰山之脈出崑崙黃河之源從天上故天下言山之高者必曰泰山言水之大者必曰黃河以其脈長而源遠也然舍泰山黃河而未足以言山水之高大者明矣使山必如泰山而後可言山水必如黃河而後可言水其為山水者不亦難乎或有割泰山之脈而突兀為山分黃河之源而波瀾為水即可謂真山水名天下傳後世者無疑矣蓮峰和尚幼入沙門得法最早開吾備氣運之先操履端正機用縱橫不愧為明發之子天童徑山之孫可謂能分割泰山黃河而自成一山一水之奇脈長而源遠也二十年來數踞雄剎振臨濟宗旨壺蘭為之增色近退居雲峰於破故紙堆中爛葛藤叢裏簡點出來自生光焰斯其精光之不可磨滅者歟猶之迅雷閃電震發虛空凡有耳有目者莫不聞之見之夫聞者既聞矣見者既見矣諒必知其可以名天下可以傳後世是之為至公之聞見也然聞見而出於至公則余之所言亦公言也敢阿其所好也哉丙午臘月望日同門法弟超裴書于養苔山房序原書闕蓮峰禪師語録目録序文卷第一福建興化孤山禪寺語録興化九座山興國禪寺語録卷第二興化報恩禪寺語録卷第三興化龍華萬壽禪寺語録興化蘆山通天禪寺語録興化獅山西明禪寺語録卷第四小參卷第五示衆拈古頌古代古卷第六入室機緣法語讚自題卷第七序歌傳行實啓引辭銘佛事卷第八文偈雜詠上卷第九雜詠中卷第十雜詠下有序蓮峰禪師語録目録終
