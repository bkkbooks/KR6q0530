body:
  text: 嗣法門人性深等編入室典座進師問調和百味即不問離卻木杓道將一句來座無語師打云未是踢淨瓶漢髻光進師云我見燈明佛木光瑞如此如何是本光光擬議師一棒光云爍破和尚面門師又打云遲了八刻知客進師云父母未生前即不問賓主相見時如何客云好手手中呈好手師便打云紅心心裏中紅心庫頭進師云愛惜常住物如護眼中珠如何是眼中珠僧云滿口道不著師打云擉瞎了也足一進師云牛在山中草足水足時如何足云孤峰絶頂師云牛出山去東觸西觸時如何足拂具便行師打云免不得這一鞭若海進師云師資授受祖祖相傳且道傳個什麼海云一雨普滋千峰秀色師打云政恁麼時又作麼生海云一棒當頭落山山盡點頭師云且喜棒有人喫巡照進師云不許夜行投明須到是如何照云青山原不動師云未在更道照云白雲任去留師打云是賞你是罰你照云求師開示師直打退顧侍者云今日入室有幾箇野干幾箇獅子者擬議師亦打退勘辨機緣維那參次師指果云不得動著動著即禍生那拈起便喫師云貪嘴禪和傍僧云吐不出那云城門失火師打傍僧云殃及池魚那云某甲今日失利師云果然果然僧問如何是和尚為人處師云牽牛過太虛僧云此心能有幾人知師云汝亦未知在僧伴行次云今日懶師云水牯牛卻健僧云水牯牛亦懶師云因甚水牯牛亦懶僧云這幾日肚飢師云大地盡是草因甚不肯喫僧云被和尚礙卻師云可憐餓殺水牯牛師問僧汝無拄杖子我奪卻汝拄杖子時如何僧擬議師便打僧亂統師與一頓僧參師問上座名甚麼僧云古絃師云古絃無音韻汝試一彈看僧無語師云且坐喫茶僧問如何是諸佛出身處師云山門八字開僧無語師云自埋了也僧問和尚出山即不問歸山一句作麼生道師云楖栗橫擔不顧人直入千峰萬峰去僧云忽遇毒蛇當路時如何師推退云信步踏殺僧無語僧辭云某甲歸家去師云家在甚麼處僧云在者裏師云既在者裏又歸個什麼僧無語師便掌僧咄師連掌出僧看經次師云離卻文字道將一句來僧云待某甲再看幾行師云徒勞眼力居士問如何是本來面目師舉箸云會麼士云會師云汝作麼生會士無語師放下云認著依然還不是居士參師云行也是坐也是腳跟在甚處士云點地在師云忽遇翻斤斗又如何士罔措師云未點地在齋次老宿云今日可喫多些師云日日是好日宿微笑居士云昨日正好著力師云何謂也士云父母未生前師云喫向何處去士舉箸思之師與一摑師問僧汝在九座還有得力處也無僧豎拳師云不是不是僧云請和尚開示師云禮拜了向汝道僧禮拜師便踏倒僧罔措老宿問人天交接兩得相見且道見個什麼師與鼻孔一捏云會麼宿云不會師云八十年來空白首僧參師云今日有幾人在這裏僧云五人師云阿那個不在其數僧云拄杖子師云錯認不少一僧云佛祖位中留不住師遂入方丈本源問妙應出世灶産白蓮和尚出世有何祥瑞師云山青水緑源云也是間家具師云如何是汝真底源喝師云也是間家具居士問世界許多闊因甚鐘聲披七條師云馬蹄何處避殘紅師問居士無夢無想主人翁在甚麼處士呈偈云踏破草鞋無覓處得來原不費工夫倦時長伸兩腳睡翻身豈藉別人扶師圈之復示偈云子未升我堂何以入我室勘破主人公一生參學畢畢不畢好奪判官手裏筆士答云數年隨衆不升堂一偈登廊便入室得法原來髮裏人何曾機鋒污紙筆師頷之僧問百丈未建叢林古聖棲在何所師云深山樹下進云忽遇狂風吹倒時如何師云灰頭土面進云爭奈銅頭鐵額何師云拖出死尸去僧問譬如有人將指指月只見其月不見其指師云你見月耶見指耶僧云見指師云你指在甚處僧無語師豎指僧又無語師掌云莫道見指好僧作務師云此一卷經誦得辛苦僧云一字也無師云汝在者裏作甚麼僧云篩米師云莫道無一字好師問僧云曾有上首否僧云有一個師云是住菴是行腳僧云也不住菴也不行腳師云在什麼處僧云莫當面蹉過師與一棒長修孝廉問弟子要覓個人不到處有麼師云有即有恐居士行履不得士云末後一句是有是無師掌云會麼士笑之師云此事須是個人始得承當士云承當即不得也師云雖然承當不得也要著力士云有口喫飯用力作麼師云有口且置秪如無口將什麼喫士無對師問居士古人問如何是佛答云獨木橋其意如何士云請師代一轉語師云度牛度馬士云秪如獨木橋如何度得牛馬師云切莫顛倒士問萬念方興念從何起師云百花叢裏過一葉不沾身士云一念未起念從何止師云無處摸索問猛虎不食其子因甚蜻蜓自咬尾巴師云求人不如求己問魚以水為命因甚向水裏死師云口是禍門師問僧向上一路千聖不傳如何是不傳底路僧云險師云錯僧云錯錯師云亂錯作麼僧云明眼人難瞞師云勘破了也師問僧云洗面摸著鼻時如何僧罔措師打云當面蹉過師問僧云飢餐渴飲須有尋常茶飯茶飯俱無將何抵待僧云金剛圈栗棘蓬師云鯁殺你又問一僧無對師云餓殺闍黎又問一僧云某甲不喫師云爭奈飢何僧云從來不飢師云如何是你飽處僧噓一噓師云典座明日不得普請問佛法只是一個道理因甚有明與不明師云秋水共長天一色進云生如寄死如歸了生脫死時如何師云頂天立地僧拜云謝師指示某甲承當去也師云謝三娘稱銀居士問壁立萬仞即不問轉身一句請師道師云朝往西天暮歸東土士佇思師推云還在這裏站腳問山河大地悉皆消殞和尚向何處安身立命師便掌僧無語師云向何處去也僧云師子窟中無異獸象王行處絶狐蹤師云也是無尾猢猻僧參師拈紙問有可用無可用僧云有可用師云作麼生用僧云符到奉行師云許汝道得僧掩耳師又拈云有可用無可用僧云雪上加霜師云何不道無可用僧云從來不落人圈套師云蝦跳不出斗僧揮案便行師大笑法語示若海深西堂佛法如大海轉入轉深而大徹底人要且通身無涓滴赤灑灑乾嚗嚗始能勘破從上老古錐立地為人處盡是虛張聲勢赤手殺人見僧入門非棒即喝直得人人眼中血出雪裏花開更説什麼隔山見煙便知是火隔墻見角便知是牛正好倒折其拄杖塞斷其喉嚨方稱衲僧好手也有一種無正因行腳不窮徹底淵源只顧隨波逐浪將謂宗門實有如是事悲夫上座既已登我堂入我室好把間家具盡底拋卻將自家十成金剛鑽攤向十字街頭自有良賈酬價示石藏書記石藏於玉玉中有石則人皆見之玉藏于石石中之玉非智者則不能明辨或呼為燕或指為碔而玉人餽獻反招刖足之辱一旦奇遇良工剖而出之精光奪目潔澤潤人不但價重連城且亦珍為遞世之寶詎非其物雖貴亦須遇人始不沉埋於世耶況乎出世之寶非石能藏非玉可比光超日月價越大千良匠雕琢不及佛眼窺覷無由若雜在瓦礫瓦礫生光墜在枯荄枯荄發秀然有如是奇特如是受用焉得人人而不自剖耶闍黎既已自剖必知寶作何色可以呈似座山座山自不壓良為賤也時雪雨飄飄連旬弗霽倏啓寒窗暘輝正挂于疏梅之上特筆此以勗石藏記室也示黃百拙居士在家學道須以信為先信乃道之源德之毋無信則不圖成佛不思修德無信則不捨貪嗔癡不持戒定慧至於諸惡莫作衆善奉行蓋由信始居士既信斯道視名位危如纍卵隨素分安若泰山寵辱之驚亦何有於居士哉然而己躬事要當時時省察無論正念邪念力與掃卻看看日用之中主人翁在什麼處朝如是暮如是動如是靜如是年久歲深工夫純熟則不照自照不覺自覺矣龐居士云日用事無別惟吾自偶諧頭頭非取舍處處勿張乖朱紫誰為號丘山絶點埃神通並妙用運水及搬柴所以大悟之人入林不動草入水不動波折旋俯仰與道相符並書與居士勤而行之匪惟居安深造而且有逢原消息示一音侍者萬法歸一一歸何處觀世音將錢買糊餅放下手原來是個饅頭古人居於學地啓一問端皆從真疑中所發而宗師家垂一兩則語撈摝後昆亦與鐵門限相似除非參透向上關捩子者舉止皆為其所礙一音禪人既久歷叢林必須過此門限始造一音演唱處若只向水流風動鵲噪鴉鳴會大似徐六擔板若向青州七斤衫庭前柏樹子會猶是徐六擔板任你更向諸佛未出世達磨未西來世界未立形名未兆會去也是箇擔板漢直饒將此三段葛藤拋向大千之外直得淨裸裸赤灑灑沒可把性命猶在別人手裏未免眼目定動口裏膠生禪人何以免斯過患試下一轉語看示心鏡禪德本色住山人原無刀斧痕日出而作日入而息鑿井而飲耕田而食説什麼祖意教意即五千四十八卷是他家揩卓布一千七百則公案是東壁角禿苕帚風吹不搖雨灑不濕佛祖到來也須立在下階十聖三賢無處插腳雖然具此天然氣骨猶未是吾家巨器正好向大爐冶中受惡辣鉗槌從頭煆煉一旦火星迸出碓嘴花開始見從前所厭所棄底盡是自家寶藏無貴賤無餘欠橫拈直用不假外求然後以此接待諸方以此濟諸貧乏報黃面之深恩了自家之大事心鏡禪德自脫白以來惟務種田博飯影不出山且亦訓徒足法修德可風書此為贈少當鞭影日倘向此中翻轉面皮始不負余饒舌耳示古拙維那上古之世人崇簡朴抱智若愚施巧若拙木食草衣以自富巢居穴處而恆安蓋其飫天地之精華固聖賢之元氣者也趨於今之時道漸微衰情竇日穿狂瀾不障異端百出大義乖張而元氣泄矣然匪聖賢復出則不能挽斯風而由斯道也是以從上古錐特為此事單提向上一著令人深造于閫極耳昔雲峰悅參大愚芝芝見其儀容表表可觀談吐條條有緒但未知向上一著特上堂云大家相聚喫莖齏若喚作一莖齏墮地獄如箭悅聞之茫然不知所以請益於芝芝云我這裏忍飢不暇何暇與汝説禪乎與我街坊作化主去悅不敢違命及歸納疏又求指示芝云佛法不怕爛卻我堂中無人與我作維那去悅雖領命恨芝不與説破正怏怏間忽聞架上桶箍墮地一聲豁然大悟徑趨方丈芝一見云且喜維那大事了畢此正回風之手也古拙維那參侍山僧有年鋭志研窮矢透綱宗今春豫有雲間之行而上座仍到明發省覲不惟為法切且亦道誼深矣更冀其如雲峰悅亦卒地折嚗地斷一番匪但眉尖添卻十分光彩而肩上擔子亦無可卸處示吳輝如居士高峰妙禪師參雪巖欽有年欽一日問高云日間浩浩作得主否高云得又云夢中作得主否高云得又云正睡無夢無想主人翁在什麼處高於此茫然立心研究後聞枕子落地豁然大悟今居士處於鬧市之中眼見耳聞無非鄭聲趙色劍樹刀山即高峰大悟處且置為第二之門從前二處作主是第一要緊關頭可於此咬定牙關攝住猿馬將世間景象作一場傀儡觀設或渾身入草去好與驀鼻拽將回不為色聲所埋不為榮辱所困日久歲深照顧純熟自然行履與他人迥別舉眸一顧管絃樓花柳巷與光明藏菩提場何所殊異哉然後更研窮無夢無想主人翁向何處安立一日漆桶開花山僧遙助汝喜示古臨上座拄杖頭一撥便轉猶是回頭轉腦漢腳跟下得路便行猶是逐浪隨波漢長年不出戶諸佛不知名猶是避聲躲色漢設或總不恁麼未免業識茫茫無本可據故此事不在語默上不在知見上不在思惟上不在一切境上你可放下諸緣立心參究直到向上關捩重重透脫自然通身是眼別有生涯時時與古人把手共行鼻孔相拄不但血脈貫通成吾家之種草且亦智過於師乃法門之英傑也祝祝與朴菴上座住山朴菴上座吾莆之名人也少年遍訪知識已知有宗門旨趣因海氛日熾脫臼參方余嘗懷之而不知其何往庚子夏初會于福嚴見其出言吐句與三年前有異所謂禪和家三日不相見莫作等間看語不誣矣未久到華亭參本師於明發仍朝夕過余寮請益余詰其所得雖向上一著力不甚充然敦敦究明此一件大事也欲返閩中把茅蓋頂向折腳鐺下挲裙劈褲不到古人田地而不已我老人嘉其志有逢人不出出誰是此際憑君且熟籌之句勗之余見其氣象過人終非籠中之物乃與首偈以當鉢袋子令其不作洛浦向他家齏甕裏淹殺亦可以倣香嚴於南陽擲礫處脫穎也偈云從來坐臥在其中家具現前用不窮好把一枝無孔笛月明吹過海門東示諸道友處世修身殊為不易出則非繁華美麗即醜惡艱虞入則非恩愛團圞即怨憎迫逼多少英烈丈夫被此瞞卻有欲不被其所瞞無鐵石腸金剛志豈可得耶然言之易行之難舍醜惡怨憎易舍美麗恩愛難暫時易長時難有此難易之殊猶在苦海頭出頭沒也欲直出苦輪永離生死必須興勇猛心發精進力如將軍出陳駿馬追風不顧危亡單刀直入將癡頑昏昧魔軍一併斬斷矢參自性彌陀向何處安身本來善知識是甚形儀積日纍月歲久年深忽一聲㘞地如大地平沉杲日東湧從前美惡愛憎盡皆瓦解冰消擇火燒香無非現前佛事到此田地山僧未免一棒賞之若不如斯是自暴棄示禪人百丈開田迦葉踏土普化搖鈴禾山打鼓可謂古今罕聞叢林標準蓮長老雖不與從上諸祖把手共行要且與時時相見既從上諸祖過去久矣作麼生與他相見莫是他開田踏土我亦開田踏土他搖鈴打鼓我亦搖鈴打鼓麼若作如斯解會大似捉影捕風認指忘月汝須向間忙動靜之中真實參究參見從上諸祖面目古之今之了無間隔方不愧爾遠離宗親剃除鬚髮若不興此決烈之志徒向禪林空過日逢人也道出家高與念宗禪德頌古之作始自汾陽慈明之世盛於雪竇大慧之時後一代不如一代至於流弊之甚莫過于今也古人發明大事之後向水邊林下養成頭角方施自家手眼播弄佛祖機權或拈或頌或抑或揚是皆發揮到人而所未到發人而所未發不吝餘波以光後世所以雪竇大慧有百則之奇道震一時名揚千古是皆波瀾闊大氣宇超群所致非強然也如無盡悟德山托鉢之頌黃龍南悟趙州勘婆子之頌亦是隨機發作非強然也不似當今二三初學才入叢林盡謂欲究明大事立地參尋到一期半期鑽無入頭咬無意味便無長遠之志攢入葛藤窠弄出汗臭氣竊別人涕唾作自己風光不顧自瞞珍為至寶到處逢人即便拈出真可謂鶻臭當風立也茲因禪德進言不覺忉怛如此若是過量人必不墮斯覆轍也示諸居士豎法幢擊法鼓振法音灑甘露拈出雲門一字關懺盡殺佛與殺祖懺已懺竟且佛祖作麼生殺龐老云護生須是殺殺盡始安居大小龐老愛憎之迹未忘殺護之機猶在張拙云欲除煩惱重增病趣向真如亦是邪堪笑二居士同途把手不同歸到此田地方稱了事凡夫一種平懷泯然自盡也無佛可殺也無生可護也無福可求也無罪可懺無罪可懺罪若冰消無福可求福如川至雖然總不似諸上善人當劫灰之後發希有之心度諸苦輪同歸真際自是頓超古人一頭地特拈首偈要自信得及曠劫結來勝妙因共弘悲願運家珍須知三世如來種盡是寰中浩浩人示雪疑上座閉關上座所掩之關者非利名文字之關也非間散恬退之關也乃脫死生超佛祖之關也透差別出平實之關也況諸佛大事遍界難藏即此關目已枝生節外矣倘是銅頭鐵額任百匝千重一時粉碎山僧許汝同出隻手若局躅逡巡爪牙不敢伸露必須循途守轍將從上爛葛藤極力咬嚼一朝錯口咬破舌頭方知滴滴血從口出而法法不從人得也所謂悟後不疑言句猶謂大病非經勞筋苦骨則不能成鎮州之大器矣茲上座處於關中除二時茶飯外一切逆順緣境俱付罔聞則自然安樂作個透關漢子或小不忍則亂大謀是吾憂也是以特寄數言少助藥石示髻光禪人趙州丱髻與師同參南泉泉問云還見瑞像否州云不見瑞像只見臥如來泉起云汝是有主沙彌無主沙彌州云有主沙彌泉云如何是汝主州云孟春猶寒伏惟和尚尊侯萬福泉器之許其入室此少年入道第一箇樣子也又開聖覺參五祖演有年祖問云釋迦彌勒猶是他奴且道他是阿誰覺云胡張三黑李四祖首肯明日再勘覺云昨日答和尚了也祖云不是不是覺云為甚昨日是今日不是祖云昨日是今日不是覺於言下大悟後拈香不原所得當下胸如刀剜竟至不愈此是真參實悟第二箇樣子可為昧本負心者戒子在座山提挈有年才學雖敏俊於人而大事殊未洞達譬猶飢者見殘羹餿飯津津不忍置雖可嘉而亦可慮也倘自知非從腸倒瀉則及第之消息現前矣苟或不然本是醍醐翻成毒藥今之叢林中此毒者多所以采斯入道之真方二則為子明鏡一日照破自家研醜始信吾不汝欺矣示希悅禪人持法華經法華者統諸佛降靈之本致也夫本致者乃開佛知見示佛知見令群生悟佛知見入佛知見世諦語言資生業等皆與實相不相違背是故僧問古德云如何是佛答云麻三斤又云如何是佛答云廬陵米什麼價伶俐漢與麼悟去一句了然超百億奚必從朝至暮尋文數墨如伶俜之子甘守困窮哉然悟須實悟若未實悟不妨向沙裏揀金石中剖玉一日努開正眼穿破牛皮如貧得寶如暗得燈矣豈不見秦國夫人云終日看經文如逢舊識人勿言頻有礙一舉一回新此所謂真看經也又法達云誦經三千部曹溪一句亡未明出世旨寧歇纍生狂此所謂真誦經也豈今之人不若古之人乎堂堂僧相不若閨閣女流乎蓋為自信不及所以法王大寶不敢擔任汝今勉諸復示林漢藻居士渾身俱是痛誰是不痛者若捉得這漢痛與不痛總不干他事始知宗門之下棒不虛施如殺人刀如活人劍不可向死水裏淹殺直須棒下有出身之路向髑髏上放大光明方有少分酬恩處西來直指指此靈山成道成此山僧棒棒棒此惟此一事實餘二則非真凡所瑣屑不足介懷邪正之門須自具眼若問如何是髑髏上光明痛痛示海寧禪人男子漢立身學道必須真參實究直造頭頭合轍步步相應猶未稱衲僧分上事那堪册子上漁獵意識裏摶量抱負聰明自立知見如坐井觀天鑿筒窺豹病之甚矣今因病來求示故不忍緘口度春問汝四大本空病從何起雙樹還真佛從何覓仲尼夕死道從何聞大地盡皆是草藥從何得向這裏討箇消息然後來我手裏喫棒未為遲也示希忠禪人梅花未吐菊圃猶黃偶躡足于蜚山之頂嘯月烹泉有僧希忠者火裏煨芋影弗下山向前作禮求示余曰汝生平所作何功所修何德一一舉似山僧是處與汝證據不是處與汝鏟卻忠曰某少年曾受人指誨常學坐禪到四大皆空神遊遍界萬境現前天龍皆至晝夜晦明眼不交睫未知是邪耶正耶余曰西來祖意如杲日麗天神龍出海不自參取白日無端向鬼窟裏作活計縱然坐到終年不動與木偶人一般高推聖境辜負己靈悉是波旬眷屬耳豈不聞永嘉云絶學無為間道人不除妄想不求真無明實性即佛性幻化空身是法身於此荷擔得則行亦禪住亦禪語默動靜體安然不須妄想求成佛萬里無雲萬里天倘將信將疑好把狗子無佛性之話時時咬嚼刻刻提撕趙州老漢是何面目一日賊身敗露不惟從前聖境如湯沃雪終日穿衣喫飯運水搬柴無入而不自得矣忠禮謝而退僧請益示之僧問大通智勝佛其義云何師云我非座主焉能論義僧云豈無方便師云此不具別傳眼目者總依因緣事迹闡演不惟有負如來大意亦瞎卻將來眼耳據子所問大通智勝者即無相真身當人之本覺也無由窺覷不可名模強名曰大通夫通者該括十虛包羅三界意識根塵精粗表裏無不貫通若有通相可見即非大通也智勝者不可以智知不可以識識掃頓漸空有之蹤越見聞覺知之宇佛者清淨本然不從人得長年家裏坐北斗面南看十劫者十智也智眼未開為識膜所障謂之劫洞開智眼識海自枯如日照臨謂之通此智既通與真身同壽即古即今無終無始坐者如如不動而常在其中也道場者萬象森羅塵塵剎剎應物現形如水中月古德云盡日燒香擇火不知身是道場即此謂也佛法不現前者佛即法也法即佛也法性本自空寂大功不宰正位不居所謂不現前也文殊普賢起佛見法見被世尊貶向二鐵圍山非過量人不能達斯田地不得成佛道者法身無相何聖何凡真佛無為何成何壞譬若虛空具舍衆象於諸境界無所分別所謂不得成也無壞無成者在聖不增在凡不減非言可詮非心可測須是悟徹一番豈不見古人或坐破蒲團因捲簾之悟或努力擊石出火之悟或悟於聞雞或悟於吹燭今人不善求妙悟希望成佛高推聖境墮入邪途而不知也子欲善求妙悟須效古人用功一日漆桶開花面目與大通智勝何別僧禮謝而退讚彌陀佛西竺應身娑婆獨步垂手蓬頭已敵國富無端撒土撒沙大似賊身敗露惡聲今古挂唇皮滿面慚惶渾不顧雪山捐身檀特伏波旬兩道眉毛霜雪春三十六宮留不住空遺一鉢纍天人三齡過了又三齡飢火熬如木石形弄得一場無合煞剛言夜半悟明星觀音水流風動誰能識鵲噪鴉鳴盡露顏應現豈惟三十二大悲救苦遍人間洛伽之中磐陀之上箕坐巍巍接人靡量手眼通身兮超於見聞慈悲一種兮不可模樣何須紫竹引清風白雀久依也解唱皎皎秋江月一輪天人何處不瞻仰蛤蜊説法特度仁君猶蓮出水遍界清芬洛伽留不住魚鳥各超群任超群何所聞如意高揮千嶂雲稽首菩薩自在何觀潭澄靜夜雪覆長安太虛未廣芥子尤寬間雲出岫明珠走盤圓通門戶塵塵啓月上青山玉一團馬郎婦普門應現古如來雙髻平梳滿面埃得意高眠湖海外何須破浪待春雷低頭看孰心灰未到龍門點額回不向洛伽藏滯貨卻來鬧市逞生涯堪嗟賣盡無人識流落一身知幾家初祖芥不投針立地忙強分節目賺神光雖然隻履迢迢去今古何嘗出大唐善財咄哉小孩兒宛有丈夫作打透文殊門廓開彌勒閣腳跟在處兮截斷千差縹渺百城兮天飛一鶴六祖識義不識字是心不是風鬻薪與踏碓隨處展宗風何必傳衣夜渡呵呵笑倒山翁準提像清淨本然靡聞靡見妙用圓𠁼千化萬變能武能文能惡能善雄猛慈悲不隔條線福慧一如動靜雙遣面如滿月機猶閃電天人心傾波旬膽顫作諸佛之爺娘開法門之方便幸然現出宰官身頂門有眼須親薦布袋和尚這個胖漢慣混天真不居內院遍露賊身高提扇子兮直令邪風遠播橫拖布袋兮可中有甚奇珍肚皮內參天荊棘面門上徑尺埃塵花街柳巷無人識笑裏藏刀賺殺人羅漢圖這隊老臊胡從來好賣弄無一是真實聚頭乾打鬨寸絲不挂兮費卻幾許金針般若無言兮潦倒開眸作夢搔得自家癢處慶快渾身掃得聞塵淨時耳目何用布袋橫拖兮等間笑破虛空蒙頭枯坐兮未免熱瞞海衆交參龍象兮現前水月一家師子嚬呻兮驚起須彌不動天宮受供嘴未乾猶望百鳥銜花送莫奉送西天東土佛梁棟十八羅漢讚豎指心月孤圓不勞直指瞻之仰之白雲萬里撥眉剔起眉毛眼睛突出大地山河竟是何物入定長年箕踞自困玄關鬼窟打破滿目青山擊磬白雪陽春一擊粉碎四海魚龍切莫瞌睡降龍倒嶽傾湫乾坤陡黑托出摩尼風雨頓息伏虎密運慈機虛張怒目嚮化煙菟無繩自縛朝陽𣰦毿布衲補綴難全金針刺罷日麗中天對月熟讀琅函東方月亮一句了然口挂壁上弄獅未曾絶乳便解咬人況遭教壞牙爪維伸扶杖既承渠力得路便行橫拈直拄疑殺後生洗耳淨掃聞塵松風謖謖勘破觀音圓通第一寫經拾柿裁蕉塗鴉潑墨寫到驢年竟無一畫憑几隱几曲肱深觀自在不審人間是何年代執卷執持文字徒自勞神一篇間語分付何人托塔重似丘山輕如毛羽一座巍巍掌握寰宇負袋團團叉口包括乾坤提起放下笑納風雲抱膝不入那伽端然抱足若解轉身任君伸縮合掌三界獨尊更禮何物有情無情皆當作佛雲棲大士貌恍枯柯道高震旦佛祖葛藤一筆勾斷五十餘年撒真珠大地眼睛皆自換分身處處現那伽休云獨坐錢塘畔曹山慱山湛然萬如四和尚暨黃居士合圖這隊古錐慣撾毒鼓佛世之鸞宗門之虎不是文殊問疾於維摩亦非龐公問道於馬祖賓主交參言不聞君臣回互面相睹去來現在盡其中東土一花開葉五洞上家風付與誰近得慱山高接武龍池汲浪活滔滔達磨口門猶未補莫謂僧繇畫不成萬松林下鎮千古座山獅林和尚力擔重擔傑立叢林丈夫之膽赤子之心滅瞎驢眼脫太白針見佛便殺逢虎便擒簸土揚塵十有載座山頂上龍高吟竊卻文錢買履去高山流水不知音金粟百老和尚才離漳南便承祖印振臨濟宗新金粟令拈起破米篩隨處設坑阱奪食與驅耕風雷未足迅海嶽掀翻二十年返躑師兄皆受命模樣若教畫得成直待瞎驢成佛竟蓮山超有公寶峰禪宿及諸上人像稽首我祖濁世導師重光蓮灶廓振清規剖寶峰寶發金山枝五侯結膝萬象揚眉諸相非相徒費王維百年三萬六千日箇裏也須著眼窺月川禪師像齒登四皓貌若蒼童規模遠大表裏融通吮金栗乳折鼓山兮龍蛇翻筆下山水富胸中身外無長物逍遙播祖風老更入廛垂手還我法弟川公十華黃司理像謂翁是佛鬚眉滿面謂翁是仙未拋邪劍謂是靖節先生五柳無栽謂是和靖居士梅花未種袍笏不欣溪山長眷格外之操可仰可扳形中之寶誰稱誰羡羡不羡憑藉筆尖通一線心月藏主像心月孤圓光吞萬象萬象現前鼻孔遼天與夫二三老漢對談何事盡其五千餘卷了不能詮白雲淡濘兮從容出沒丹崖壁立兮孰可比肩正法于今皆掃地謾將賤賣作真傳惺寂禪德像這個阿師言而不言住而不住大地是家欲從何去杖頭杖底兮撥動清風師子戲遊兮不求伴侶老成若再見諸方八十趙州即是你象龍柯居士像怪石巖巖奇花簇簇一榻高間四維清樂山中之仙雲外之鶴隱宰官身現長者作唾令自乾攪亦不濁遺書子孫施德耕牧甲子從頭數到周烏山轉作無生國龍泉院尼淨白合門出世圖念爾公求立拋閨閣振龍泉度盡家親脫世緣不愧龐家成四果已超孟母訓三遷眉班露出末山頂脈遠正承愛道傳匪但姑亦賢女亦賢且有鸞膠續彈絃蒲團下竹杖邊盡是空王未語前山巔巔水漣漣樹數株經數篇須彌為筆寫難全分付爾公高著眼滿盤托出老婆禪雪癡禪德小影當年借路過烏衣閩漢山川更險巇夢境一場陟歷盡春風花發故園枝爛熳花飛春復秋堂堂晏坐息馳求等間坐得蒲團破慶快溈山水牯牛座山智鏡禪德不耽世味自童真壯歲侍師遍問津兩處招提同掌握蒼蒼鬚鬢已如銀面目未生兮何所名邈佛心無相兮不可疏親蒲團坐破知何日智鏡常明夢不侵止言居士小影咄這年少超超卓卓曰佛曰禪不耕不讀脫先進遺風恃文章滿腹為竊渡蘆之贓翻投面壁之殼一身無處不風流何事荷擔多絡索若遇法王正令行撥轉杖頭與一摑線路傍通知不知毫端變化君頭角朱明一居士壽像即釋即儒無解無縛自有山林何須樓閣蒼蒼之松巖巖之硌雲出岫其無心書橫攤以獨樂壽不問于王喬身已齊乎鵬鶴吾道何聞幸無穿鑿歐道者像有大士在上宴坐磐陀了然自得諧老室家未嘗間隔子承父教兮道者遺風共話無生兮龐公標格舌頭不動聲如雷舍卻觀音誰證得林門黃孺人像荊山之璞赤水之璣所聞者廣所見者稀何為品譬節烈相暉林有黃母少守貞幃慈音繞膝檗志如溰縫麻衣暖嚼雪療飢案盈烈史女教玄機雖遭患難高享古稀不假春風頻點綴蟠桃香已噴仙衣自題身無可藏齒尚未補腦後見腮風前播土入與筆硯為儔出與犁鋤作伍撞著夙世冤家費卻一張弓弩半生漏逗得人嗤恁麼為人太喫苦未喫苦不作不食慚懷祖霜劍西堂請爾其生耶豈非鹵莽慧不滿升福不足兩隨處浮沉逢人勉強既落丹青何妨卓賞樹老葉稀水流石長才著破草鞋江山痛腳指不傳臨濟宗焉得少林髓髓處結生冤拔人出死水面目雖可憎英靈奚足齒一回相見一回羞自己頭屙自己屎若海首座請徑山師翁費老和尚讚稽首老師翁道譽蓋先達大用活如龍玄機峻似嶽棒喝一齊施人境兩俱奪挽澆漓之風瘳瞑眩之目叢林歷踞而萬派朝宗正統弘通以赤身荷法誰云不是馬大師天下英靈遭踏殺又自題這漢不受羅籠反招殃禍親見汾陽錯禮達磨鯤鯨直釣兮玉麈橫揮英傑熱瞞兮金毛獨坐一身隨處得自由罷駕鐵船向九座座山知幻爾首座請耳朵卓朔鼻孔軒昂未曾描寫已露堂堂或鉤或錐兮提持自在一語一默兮文彩全彰師子生來師子子幾回哮吼震諸方云何又逐春風去為愛常山一脈長光澤常山霜劍首座再請坐若孤峰映日行猶活水流川金睛眼昂頭拂尾拄杖子覆地掀天不圖小利不豎空拳阿誰烈漢直契機先一枝拔出千花外萬善同歸萬象前萬善天懷本西堂請眼若星光貌如柴瘦展驅風逐電之機開呵佛罵祖之口陳年曆日一筆勾笑看瞎驢成隊走買山莫悵無錢養子誰知若母生涯不盡白雲邊從人喚作騎牛叟白雲默山演西堂請椹衣赫赫猊座巍巍眼光驀射鼻孔下垂犀扇不取布毛不吹有子憑呼喚未嘗別指麾驊騮豈但馳千里濟北風高任遠追雪英中侍者請這齪漢甚無端掃直指慣熱瞞逢鱗則釣遇案便翻六處冬行春令半生腳瘦鞋寬見面聞名誰不識白頭猶自踞木蘭石憨西堂請頂若峰高臉猶核瘦胡蜂不戀窩獅子合咆吼間拈龜毛拂明瞞逐塊狗言語顛倒顛如籃盛水走老漢真儀描得就笑他普化翻斤斗徹空西堂請昔年此地發春風芳韻襲人西復東大樹蓋出培得久枝頭梅子熟雙雙孤山心澄印人二西堂請年少奪錦標垂老臥庵舍兩孔氣沖天雙瞳光照夜棒下辨龍蛇海內騰聲價果是忤逆兒不妨將伊罵罵任罵一幅壽山永高挂壽山慧嚴西堂請面玷朝霞胸空魯史開寶幢花結寶幢子誰偽誰真匪朱匪紫舒展收藏總由伊從來機用如雲駛龍華自牧上座請嘯月臥雲疏懶行徑種田博飯本分生涯曾向此山幾經寒暑復攜竿木遍弄爪牙翠竹蒼松皆依舊今年樹吐去年花雲峰監院古請貌如古木頂如峰懶散無能振祖風拄杖凌凌長閣壁從人喚作住山翁遁庵常住請
