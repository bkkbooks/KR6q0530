body:
  text: 嗣法門人性深等編福建興化孤山禪寺語録順治十年癸巳二月念八日師在興化府隱高寺受本府莆田縣孤山寺監院慧聞等請至山門云船來陸來總須親到一番始得秪如入門一句作麼生道遂策杖而進佛殿云三世諸佛猶是素上座兒孫畢竟與伊如何相見大展三拜云不可放過伽藍堂云神功叵測呵護叢林兜樓一片從古至今祖師堂云將謂列代祖師出世度生誰知盡日向香煙裏打瞌睡遂舉香云祖師祖師惺惺著方丈云汾陽門下有西河獅子當軒據坐但有來者即便咬殺遠祖恁麼道方丈前草深一丈孤山門下不作這般去就但有來者令其覿面相見衆拜師云逢人切莫錯舉遂據坐當日衆請上堂升座拈香云此一瓣香煙浮震旦價重娑婆爇向爐中端為祝延今上皇帝聖壽萬歲萬萬歲恭願堯舜之風永扇成康之世長存路不拾遺民沾至化此一瓣香國家梁棟黎庶雲霓奉為文武寀寮郡邑尊官暨諸檀那外護伏願維持赤子征途聞五之謠欣慕宗風悟道説溪山之偈此一瓣香得意難言知恩有地久默斯要不務速説最初拈出奉為浙江嘉興府海鹽縣金粟山廣慧堂上傳臨濟正宗第三十二世本師百癡元大和尚用酬法乳之恩遂斂衣就座維那白椎云法筵龍象衆當觀第一義師云第一義諦不容擬議放開一線許汝商量還有商量者麼僧問佛為衆生出現於世和尚出世亦為度生衆生未度時如何師云眼橫鼻直進云衆生已度時如何師云鼻直眼橫進云衆生度盡時如何師云一場懡㦬居士問萬佛場中即不問臨濟宗風事若何師云一棒一條痕一掌一握血進云天上有星皆拱北人間無水不朝東師云讚嘆則不無乃云法幢未建人人立地頂天法鼓未鳴處處青山緑水及乎鳴法鼓豎法幢又是一腔曲調行滹沱正令開摩竭門庭有實有權毋固毋必或時逆水撑舟或時循途守轍或聲色堆頭尋群逐隊或清淨地上高臥橫眠入門者須登階級登階級者須入堂奧一入堂奧左之右之處處逢原自然不落階級自然透徹門庭已徹者不在斯限未徹者切須徹去若不徹去不被聲色所埋必被清淨所困似個徐六擔板更有一事須善護持直待孤山微笑即向汝道維那結椎云諦觀法王法法王法如是師便下座林明悌祝壽請上堂問叫不應山即不問如何是無陰陽地師云春來也發花進云還有方便麼師打云與汝方便了也乃云真參實究別無妙訣只要悟得本命元辰若悟得本命元辰便頓超限量迥脫根塵四相不相關五衰拋度外如出籠之鶴脫網之鱗日月星辰亦如是山河大地亦如是山僧拄杖子亦如是茲因居士久植德本正信吾宗欲其慈闈同悟本命元辰請為嵩祝山僧抖擻枯腸無甚鉤章棘句只就日月星辰山河大地及拄杖子本命元辰合祝一人之壽令其同日月星辰之光明山河大地之永固同拄杖子之矍鑠雖然莫教撞著彌勒呵呵恐笑倒濁世勞勞誰不老正信勝餐王母桃祗園不種安期棗阿呵呵下座薦覺豫禪德請上堂問赤肉無依髑髏火葬畢竟向何處安身立命師便打進云恁麼則不涉根塵超色相十方世界現全身師云死漢進云如何是活漢師又打乃云爐香燕坐柏庭前淡蕩風輕花柳鮮聞道鐵牛鑽入海令人蹙額嘆蒼天每相憶最心堅矢志遍參尊宿打失鼻孔半邊于今水流雲散湄山依舊儼然復舉僧問長沙云南泉遷化向什麼處去沙云東家作驢西家作馬僧云意旨如何沙云要騎便騎要下便下師云大小長沙疑殺天下人今日若有問覺豫禪德遷化向什麼處去秪向他道天上人間留不住妙高山頂播風雷且道古今還有差別也無久立衆慈伏惟珍重陳明元等請上堂僧問長慶坐破七個蒲團今日有個不坐底還見麼師云鈍置殺人僧喝師便打僧推禪床師連棒打退乃云參禪上士迥脫尋常鐵額銅頭頂天立地巨靈撼而不動毒鼓檛而不聞不與千聖同途不與三賢共住進一步山崩地裂退一步雨暗雲愁有時向毗盧頂𩕳上敲骨取髓有時向山僧腳跟下剜肉吹毛不顧危亡單刀直入方成個瞎驢種草倘有人聞恁麼道便掩耳而去三十棒賞他其或未然必須克勤修證將多年鐵酸餡咬嚼一番日久月深定慧充足一聞千悟頭頭物物盡是自家底要提起便提起要放下便放下受用現成莫可窮極猶未可挂放參牌初學久參各宜更進一步且如何進步處和煦春風才入室炎威又漸逼人來下座上堂問如何是奪人不奪境師云針峰壓倒阿修羅進云如何是奪境不奪人師云蟻口吞乾大海水進云如何是人境俱不奪師云一片月生海幾家人上樓進云如何是人境兩俱奪師云愁人莫向愁人説説向愁人愁殺人進云向上還有事也無師云一串穿卻乃云風動幡動那堪共語船來陸來且居門外洞山麻三斤葛藤不少臨濟乾屎橛臭氣逼人趙州喫茶打濕唇嘴雲門胡餅膨脹肚皮鐵釘飯木楂羹梗殺西天老比丘金剛圈栗棘蓬嚇退東土沙彌子總不恁麼似覺家風冷淡且二六時中如何得應用無虧去良久云一白鉢盂兩度濕調羹須具調人心王氏陳氏薦夫請上堂綱常道之基慈悲法之雨雪志守深閨戒定息繁暑恬坐一爐香乾坤闊如許請余轉法輪正法無可語超彼故良人善處得居處不圖生梵天亦不作靈圉蓮花國土中菩薩為伴侶一念已頓超況對天人舉樂土本現前不隔一端緒閨闈亦可修晝夜速進取生滅兩重關誰是關中主悟得本來人非他亦非汝同生樂土中長沾佛法乳諸佛同授記余門雙信女山僧無説説竟諸公無聞聞竟死者無超超竟生者無度度竟且修因結果一句作麼生道良久云一超直入如來地腳踏蓮花步步生下座佛誕上堂問未出母胎度人已畢和尚儼然將何指示師云天無私蓋地無私載進云世尊出世度盡眷屬和尚出世眷屬還度盡否師云明眼人難瞞進云家裏人説家裏話如何是家裏話師云金鍾敲動一天星乃云生本無生無不生指天指地最分明藍園一段風流事要假兒孫腳下行豎拂子云釋迦生也大衆還見麼便下座浴佛信士林明鑑等請上堂舉遵布衲浴佛次藥山云這個從你浴還浴得那個麼遵云把將那個來山便休長慶聞云邪法難扶師云藥山布衲大似把手上高山同行不同步今日因時及節為他拈出也要此話大行遵布衲浴佛同出一隻手山云這個從汝浴還浴得那個麼落草尋人遵云把將那個來貧兒索舊債山乃休不入虎穴爭得虎子慶云邪法難扶人平不語水平不流好將藥山布衲縛作一束拋向香水海裏蕩滌得乾淨淨地免致貽纍後人向這個那個裏分疏不下何故聻天上天下惟吾獨尊信官藥齋林公請上堂向上一路千聖不傳秪要大丈夫自信自悟自肯承當掃除見解剿絶廉纖融會精粗貫通表裏德山棒臨濟喝雪峰輥毬禾山打鼓裴相國舞笏黃庭堅聞香看諸古人顯發全體大用何等直捷山僧既作他家種草脫他印子不得所以要人人剿絶廉纖發揮妙用言言合轍滴滴朝宗同遊不二之門共助無為之治豎拂子云若向這裏見去又隔青嶂千重白雲萬里何故分明月在梅梢上看到梅梢早已遲上堂僧問人間四月春光盡孤山寺裏花正開長恨春歸無覓處誰知轉向此中來如何是來的消息師云薰風生殿閣遍界發微涼進云春夏秋冬隨變改若能轉物即如來畢竟作麼生轉師畫圓相進云自是不歸歸便得五湖煙景有誰爭師云腳跟下泥深三尺乃云薰風拂拂度南枝黃鳥呢喃纖柳絲花下人傳春欲去春光畢竟向何之實不去謾猜疑墻角海棠猶灼灼籬邊筍蕨正新肥去實去怎留伊池內碧荷爭出水林泉漸爾長炎威住不住幾回醉卻傷春客去不去杜宇聲聲月下催催任催意何為途路雖然樂到底不如歸若知歸也天地同根萬物一體青年皓首不減不增白社紅塵無彼無此我生列列立階除莫被光陰兩序使還有使得光陰者麼間烹雪茗空塵夢談笑花軒作主人靠拄杖下座省覲福嚴師翁費老和尚命秉拂上堂僧問昔日優填王造旃檀像世尊下忉利天其像出迎此意如何師云巍巍堂堂進云世尊三喚三應云無為真佛實在吾身未審在那個身師云煒煒煌煌進云秪如寶像開光人天瞻仰還解説法也無師云信心成古佛甘雨潤枯苗進云若將耳聽終難會眼處聞聲方始奇師云不是苦心人不知進云作家作家師云不勞讚嘆乃云古路三千度翠雲抱慚膜拜老慈尊去來盡是兒孫事祖父從來不出門豎拂子云諸大德於此見得祖翁如夔如鳳無黨無偏昔向金粟峰頭呵佛罵祖今踞語溪渡口滌聖陶凡粟棘蓬金剛圈拈作尋常茶飯南斗七北斗八逢人徹底掀翻肅振頽綱何殊臘月蓮花剪除異見誠乃法門甘露處動地驚天之際如清風明月之中魔外寒心英賢拱手此蓋乘願力而來作清涼大樹覆蔭人天若以一機一境一棒一喝謂覷見祖翁似向大海拾一浮漚大地得一撮土不肖昔曾瞻依座下特申省覲之忱幸蒙老和尚垂慈令兩序大德降尊就卑命升猊座不肖自慚才德俱虧機用弗足再三辭而不免秪得借老和尚大光明助演實相義秪如實相義作麼生演遮那應現遍風塵萬福莊嚴淨法身正眼當陽光突出嬴於夜半睹明星久立衆慈伏惟珍重慈光寺請上堂達磨西來意迢迢怎舉揚松直與棘曲鳧短而鶴長龍歸四海靜春老百花香幾多蹉過者叉手問空王誰知未舉棹文彩已全彰于今委悉去何處不慈光復舉尼妙總參大慧慧云古人不出方丈因甚卻到莊上喫油餈總云和尚放妙總過妙總方敢通個消息慧云我放你過你試道看總云妙總亦放和尚過慧云爭奈油餈何總一喝便出師云大慧拈出殘羹餿飯將妙總作鬼神祭賽總若不是飽參衲子幾被油餈塞卻茲山僧把火助熱諸人切忌面門著灸頌云長蛇陳勢列重重鐵騎單鎗挫戰鋒若不疆場施敵手焉知大海有真龍今日這裏有真龍麼喝一喝下座請上堂信根難具信心難生信門難入信道難行信道一行南北東西四維上下隨緣放曠任性逍遙信門一入頓超階級豁達六窗行住坐臥常在其中信根一具敷榮蓋天枝葉培植駕海梁材信心一生放下屠刀立地成佛茲潘信士廣修淨供請轉法輪不為自求如同本得山僧無可回施惟祖翁一片信地對人天盡情授受令其向信地上長養信心長培信根長住信門長行信道畫相云還見麼不用契券自當保任界至分明切莫錯認下座上堂云大道直如弦大機疾如箭不動一毫端千化與萬變本無利鈍人秪要當機薦杲日懸空薰風朴面程路迢迢不隔條線枝頭鳥語兩三聲錯落飛花紅片片復舉梵志以梧桐花獻佛佛喚仙人志應諾佛云放下著志放下左手花佛云放下著志放下右手花佛云放下著志云我今兩手皆空更放個什麼佛云吾非教汝放捨其花你當放捨外六塵內六根中六識乃至無可捨處是你免生死處志於言下悟無生忍師云世尊得人一牛還人一馬梵志抱璞求榮一場富貴特為頌出重重放下沒纖塵鬧市范丹徹骨貧明月一輪琴一操高低彈動隔墻人下座祝東林師翁壽上堂展起袈裟覆天手培松柏梃蒼然逢人問壽高多少行腳趙州老四年踏得祖翁田地著巖阿石虎花兒眼慚愧後生忙不輟街頭猶乞草鞋錢殊不知我祖翁壽量別一乾坤不屬變不屬遷仰之彌高鑽之彌堅彌勒不後威音不前亙古今而不昧歷浩劫以長存不肖恁麼指注也是起模畫樣千聞不如一見若見得徹因齋慶讚竟且慶讚一句作麼生道灑雨摩風渾不改擎天屹地一蓮山上堂問鳳凰池上客特地集孤山三通法鼓震冗夢尚未刪如何是冗夢未刪師云手執夜明符幾個知天曉進云喝散白雲千萬里數聲鳥語噪天明師云莫瞌睡乃云有佛處不得住金猿絆倒懸崖樹無佛處