府本縣寀寮尊官本山開創先和尚暨諸護法耆舊伏願沐不次之深恩趨心妙道振中興之正脈毗贊叢林此一瓣香水盡山窮頭端尾正心不負人面無慚色第二回拈出爇向爐中奉為現住江南松江府華亭縣明發禪院傳臨濟正宗第三十二世百癡元大和尚用酬法乳之恩遂斂衣就座上首白椎竟問答不録師云法幢建立待何人水到渠成萬象新珍重蟠桃休嚼破現前已露舊時仁舊仁既露難瞞具眼法幢建立貴在同條況流水高山時時現衲僧巴鼻光風霽月處處是古佛門庭一語一默本地光明顯赫一草一木當人受用無虧於此挨拶得入始信古人勞心苦骨處豈不見正覺禪師移溪伏蟒創此洪基列朝宗匠拽杷牽犁洞諸正眼秪如應承鼎命則固是克振先聲又作麼生道卓拄杖云大家伸出拔山手撥轉如來正法輪上首結椎師下座元旦立兩序上堂問祝聖報恩今已曉新年佛法又作麼生師云燈籠與露柱和南石女共木人撫掌進云春光傳信早大地盡生輝師云卻許闍黎道一半僧禮退師一喝乃云日麗風熙宇宙清萬山霜雪變溪聲梅花昨夜通消息瑞氣騰騰繞太平呈拄杖云還見太平主人麼若也見得巍巍堂堂無二無別乾坤未闢之先與太虛同壽朕兆才分之後乃率土皆臣草木林泉同沾雨露羽毛鱗甲共沐恩仁喚作深山中老僧又是鬧市頭天子喚作鬧市頭天子又是深山中老僧若也不見元正啓祚萬物咸新有無佛法雙拈卻又手橋頭揖聖人後云巢居穴處未盡良謀領衆匡徒難藏醜態藥山就牛欄説法道傳千古法昌搬羅漢開爐聲蓋諸方所以衆不在三千五百亦不論初學久修只要人人展摶天之翅個個作駕海之梁整頓腳跟輝揚化日且重新條令一句作麼生道東君如有意吹入我門來下座上元上堂此夜一輪滿笙歌沸綵樓可憐燈明佛無處可埋頭莫埋頭魔宮虎穴一任橫衝直撞柳巷花街何妨醉舞娛遊模樣粧來個個如獅如象皮毛脫落依然非馬非牛惘憧底向鑼鼓邊自管瞌睡俊俏底就光影裏賣弄風流休休休舉頭天外看誰是我同儔誕日上堂僧問沙盆已破還藉衆扶否師云天高群象正海闊百川朝進云恁麼則青山依舊也師云聽事不真喚鐘作甕進云今朝師壽正逢聖誕如何是慶讚一句師云天地同根萬物一體乃云孤峰兀坐嘴盧都搜索胸中一物無即此一條窮性命三千諸佛不如吾何故在諸佛有玄有妙有始有終在凡夫有愛有憎有優有劣山僧門下二邊不立中道不居孤迥迥峭巍巍名模不得拔仰無由雲門於拶足悟此俱胝於豎指悟此香嚴於擊竹悟此山僧於唇皮播此大衆於意識卜此倘向父母未生前上著自家壽命即同山僧壽命即同諸佛列祖壽命則見雲門悟底不在拶足俱胝悟底不在豎指香嚴悟底不在擊竹可謂移花兼蝶至買石得雲饒還卜著麼年登四十五為人多莽鹵卻把赤斑蛇喚作白額虎拍掌大笑下座開爐知浴雲莊領一蕭禪德請上堂問龍象交參即不問如何是獅子翻身處師云一任𨁝跳進云堂堂無向背特地絶商量如何是第一義師云新出紅爐金彈子簉破闍黎鐵面門進云雲生碧嶂月落寒潭師云自領三十棒進云和尚較一半師云速退速退乃云釋迦出世達磨西來為一大事因緣故蓋大事因緣雖人人具足個個全該奈含糊領略者多真實契證者少今雲水高流同登選佛之場欲契證自家大事且大事如何得契證去豎拂子云言前薦得猶是滯殼迷封句後承當未免觸途狂見直饒透脫二邊一肩擔荷早已遲了三生六十劫欲到無纖毫過患如千日並照直須三條椽下七尺單前三三兩兩逐隊尋群白日青天挨籬摸壁至於冷不知冷飢不知飢但得雪消盡自然春到來拾得寒山相見面倒拖長袖舞三臺下座若海西堂請上堂問世尊拈花迦葉微笑達磨面壁二祖安心祖祖相傳只一句師今端的付何人師云西天四七東土二三進云自從一見桃花後直至如今更不疑師云學語之流進云驚群須是英靈漢敵勝還他獅子兒師打云未到汝在乃云參禪無祕訣只要生死切打透生死關石人迸出血迦葉不聞聞世尊不説説晝夜二六時圓滿一輪月且道如何是月昨日圓今日缺復舉俱胝悟於天龍豎指處其後接人亦惟豎指師云俱胝住菴真龍困死水若不得天龍一滴活水終身埋殺今古叢林謂其只得一橛山僧今豎起拄杖若有人同俱胝悟去庶得吾宗不墜若不同俱胝悟去亦得吾宗不墜何故將相本無種男兒獨自強下座永豐寺三尊證師同請上堂一得一切得一戒一切戒一念失回光終身徒頂戴汝等諸人還識得一麼畫相云於此薦得就這裏截斷生死根源剿絶識情窠白十二時中直教如明鏡當臺物來斯照有時雖不鑒照瞞他一點不得不論佛來也殺賊來也殺直教殺到無可殺處始是諸人安身處始是諸人得戒處所謂護生須是殺殺盡始安居白牯黧奴如不會問取楊岐三腳驢下座朗玄首座請上堂問諸佛出世時如何師云大地山河一片雪僧喝師云亂喝僧無語師打退乃云西天四七東土二三這一隊老古錐無端胡言漢語節外生枝鼓動銅頭鐵額赤手殺人黨惡相濟到處展三玄戈甲列八面陳圖一縱一擒全生全殺直得敵國豎降旗萬方歸化育本色衲僧正眼看來也是平地掘坑陷人不少山僧昔年不識好惡陷他坑阱至今盡拔山之力𨁝跳不出乃喚朗首座云汝還跳得出麼朗一喝師云好一喝只是跳不出只如跳不出又且如何施設豎拂子云打麵還他州土麥唱歌須是帝鄉人下座念爾道舊偕曇易禪人請上堂若論此事如石含玉不知玉之無瑕似地擎山不知山之孤峻古人恁麼道只具一隻眼諸兄弟既在座山眉毛廝結八面峰巒聳翠一天松竹參黃無不盡知盡見若喚作此事只具一隻眼若要兩眼圓明必須洞徹內外捏碎虛空體用全彰人境俱奪向頂門上豎一隻眼然後山僧與汝點眼喝一喝下座福嚴師翁費老和尚訃音至設供拈香云驚天動地播宗風千古何人識祖翁鐵鑄面皮翻一轉依然日挂海門東昔日蒙提誨今朝事不同深恩無以答滴血占流通遂禮拜書記知幻等請上堂問法雷已震選佛場開不昧宗風請師指示師云山意衝寒欲放梅進云臘雪連山白雄風透戶寒師云大抵還他肌骨好進云千里特來呈舊面師便打乃云古木寒巖一片冰瀟瀟鳥道斷人行大家束手爐頭坐嬴得眉毛眼上橫到這裏普天匝地滴水滴凍縱有鎗旗亦無展處棒喝亦無施處無賓無主無佛無法無佛法而佛法全該無賓主而賓主歷然趙州茶雲門餅不妨應時及節破沙盆乾屎橛一任東擲西拋更有一般奇特事梅花幾點放高梢復舉雪竇云客從遠方來遺我徑寸璧中有四個字字字無人識古尊宿鬧裏有錢素長老靜處安身原憲兒孫雖不可與陶朱公鬥富亦可高低唱和客從遠方來遺我一盤果不是鄭州梨亦非青州棗上下及四維無處可尋討豎拳云和盤托出獻諸方諸方未喫已先飽只一飽直到驢年不須餵水餵草且道寸壁好果子好便下座心鏡禪德請上堂問衆生受佛戒即入諸佛位時如何師云朝為田舍郎暮登天子堂進云如何是佛位師云腳跟下薦取僧彈指師云家裏人説家裏話進云跳出三禪天師云不可亂走乃云茲心鏡耆舊設齋請揚正法山僧不向他説玄説妙説奇説特只就家裏人説家裏話遂披胸云於此薦得十二時中動轉施為如鏡照鏡了無絲毫間隔穿衣同穿衣喫飯同喫飯兩人同一碗兩年同一春東澗水流西澗水南山雲起北山雲去來莫謂頻相見蹤迹從來不出門既不出門且道相見者是什麼人喝一喝下座性原等請上堂向上一路千聖不傳欲得不傳之旨無論男女緇素必須把得定作得主直下如中流砥柱不被八風所吹不被萬物所轉一向與麼去管取刻日成功不怕甕中走鱉復舉蓮花色比丘尼變作轉輪聖王往天界迎佛世尊見云蓮花色何得越大僧而見吾汝雖見吾色身且不見吾法身惟須菩提巖中晏坐見吾法身師云須菩提晏坐身埋千尺蓮花色見佛勇冠三軍世尊只顧壓良為賤不知頭上安頭今座山四衆儼然也不須比丘尼變現神通也不須諸兄弟巖中晏坐從朝至暮諸點動靜無不親見蓮長老且道見色身耶見法身耶特為頌出奴婢殷勤將主扶主人醉裏亂高呼自家直下如親見那個男兒不丈夫下座臘八信女朱照琦請上堂雪裏藏身六載餘飢瘡拶出眼中珠明星若謂今朝現知君不是化龍魚若是個漢向未離兜率捉敗黃面老子六載飢寒不無虛設到此方解知恩報恩方解致雨興雲或破家蕩産亦得或建家立業亦得將丈六金身作一莖草將一莖草作丈六金身一推推倒五須彌一踢踢翻四大海逞人天不測之機受佛祖不盡之用只如杲日當空無所不照因甚無人悟去男兒自有通霄路不向如來行處行復云信女居塵不染塵入山修供報雙親不惟一念超庸俗已勝臥冰求鯉人慈恩厚佛道深一番提起一番新謝諸山大德上堂乍駕一隻鐵船向孤峰頂上撒張巨網直得鯤鯨魚鱉盡入其中或衝波破浪或吐納風雲或拋梭擲尺或逐隊尋群總脫此網不得如今略開一面任其優遊四海活潑百川展照日之鱗開吞舟之口何懼竿頭釣翻身去不回頭角若欲崢嶸勢也須平地一聲雷喝一喝下座孝子吳奇略薦嚴請上堂大通智勝佛十劫坐道場佛法不現前不能成佛道鈍置殺人山僧拄杖子歷劫住道場法法本現前皆已成佛道既拄杖子成佛已竟一處所一纖毫不成佛道無有是處況吳令先翁早已與拄杖子把手共行時時聞伽陵之音處處見遮那之體若待今日超拔然後得生善處豈不遲哉雖然如是若著於佛見便屬聲聞小果若離於佛見又屬婆羅門外道所謂有佛處不得住無佛處急走過四海浪平龍睡穩九天雲靜鶴飛高元旦上堂問春風浩蕩瑞氣氤氳斬新條令即不問大振宗風事若何師云金雞曉唱鳳曆新頒進云昨夜鐵牛方醒夢今朝木馬便鳴空師便喝進云玉蹄踏破深潭月金角衝開雲外天師云猶在山僧腳下乃云昨夜辭年去今朝迎歲來去來與迎送總是強安排所以古之天地即今之天地今之日月即古之日月無終無始不變不遷衲僧家一向作只般見解也是徐六擔板只見一邊豈不見四時行焉百物生焉溪桃噴日岸柳舒煙霜自化鳥爭喧東君面目一一現前笑卻橋頭何大姐借婆衫子拜婆年下座解制辭衆維那般舟請上堂問結制之後水泄不通聖凡絶迹解制之後任運騰騰自由自在不解不結時如何師云天空任鳥飛進云爭奈出門便是草何師云你何故向草裏輥進云一念普觀無量劫師云錯瞽僧問某甲幻眼已壞即不問即心即佛事如何師云照破十方進云不是心不是佛又如何師云山僧亦不識進云雲行嶺面山無礙月到波心水不知師云莫錯會乃云曩者無端畫地為牢將無限平人拘禁其中有冤無處訴有屈無處伸進一步斷貫索穿他鼻孔謦一聲須彌山塞卻口門于今春風和煦雪解冰消趁此芳展略開一線放出惡虎獰龍任其歸山歸海不論南北東西隨處縱橫自在捏碎臨濟三玄掃除浮山九帶逢人越格提持自是吾宗有賴山僧恁麼舉揚大似嫫母憐兒忘卻醜態復云林下棲遲者翻為去國人江山春萬里杖履客孤身有約鶤鵬伴不違花柳新腳跟雖未動消息遍風塵心光印人二上座請上堂師云生死關頭好著鞭重重打透未生前南山頂上雲蒸飯檀度門前狗尿天風流無限受用現前有時鑿圃有日耕煙茶來則喫客去則眠努目處雷鳴大野低眉處月印長川不問寒來暑往不圖作佛成仙只怕閻老子末後討飯錢秪如來討時將何抵塞拍案云不是巴掌便是粗拳金粟百老和尚訃音至設座拈香云去歲福嚴師翁歸今年金粟老人死雖然生死不相關法道之裒何至此愴惶大地人孤哀不肖子一炷清香一杯茶動地家聲誰振起遂舉哀開爐上堂去歲開爐貫天烈焰今冬結制不立一塵以虛空藏為伽藍直令日月星辰山河大地人物龍畜草木昆蟲同居平等性智放大光明底任其照天照地興波播浪底任其普納百川至於吟風泣露帶水拖泥無不任其自性逍遙山僧也不拗直作曲截長補短移東籬貼西壁拈魚目作明珠誑惑弟昆教壞男女何故頂門有眼明如日豈肯相牽入火坑卓拄杖下座臘八上堂地凍天寒處處山頭皆雪雲開星現人人眼裏有睛時節到來甚莫蹉過既不蹉過且道是甚麼時節莫是釋迦老子成道日麼也是杓卜聽虛聲諸兄弟明星現也且喜鼻孔不與釋迦老子殊別還見也未盡日觀山玩水出塵入剎必定是見秪如有眼者能見無眼者又作麼生見以指向空一點云不是苦心人不知元旦上堂寶鴨煙飛萬象新四方蕩蕩淨無塵皇風普被江山外野老謳歌一片春春光一片兮置干戈於無用之地嵩呼萬歲兮回化育於太和之天門外不惶龐也吠山翁枕石日高眠披瀝一心如是祝不圖成佛與成仙下座誕日圓期上堂問尼父五十學易伯玉五十知非和尚將臨五十時如何師云十目所視十手所指乃云本自圓成何物壞汝本自解脫阿誰縛汝此兩句語有一句能殺能活有一句能放能收更有一句也無放無收也無殺無活門門有出身之路步步有轉身之機是以昔日結也不曾結今日解也不曾解諸兄弟倘會得不但與山僧祝壽竟而南來法道庶不寂寥也若也不會與汝一緉草鞋效善財行腳去到孤山寺請上堂虛空無行足時節不參移春風浩蕩春氣融熙水邊林下蝶舞花琉桃紅灼灼竹緣猗猗觸瞎靈雲眼撥動香巖機遊春公子花前過萬紫千紅總不知既經花前過因甚不知仙子已騎黃鶴去徒勞崔皓復題詩復舉趙州見一菴主問有麼有麼主豎拳州云水淺不是泊船處便行又見一庵主問有麼有麼主亦豎拳州云能縱能奪能殺能活便禮拜師云趙老狂心不歇到處費弓費矢雖然一箭落雙雕也是龍頭蛇尾殊不知水淺不是泊船處正好插腳能縱能奪敗將豎降旗素上座到這裏也不淘沙見金也不敲空作響行則同行坐則同坐賓主歷然高低唱和家貧自有茶相款肯把蒿湯當禮儀佛誕上堂諸佛未出世人人鼻孔遼天及至出世後依舊杳無消息明露溪光暗藏山色妙高峰頂擊帝鐘急水灘頭栽荊棘殊不知盡法界身本無出入風鼓不搖水灑不濕白雪陽春和者稀令人千古空相憶忽相憶誰端的叵耐太原孚上座卻向角聲裏悟入山僧雖逐他群隊終不拗曲作直莫謂今古無人多虛不如少實一肩若不重荷簷換手捶胸悔莫及悔則且置且道荷擔個什麼寥寥天地間獨立望何極卓拄杖下座摻茶上堂趙州喫茶賓主歷然溈仰摘茶體用全彰座山者裏也不分其短別其長只要大家齊著力甘苦一般嘗撥雲尋鳥道趁雨上高岡鎗旗信手拔滋味逼人香汝一筐我一筐歸來奉獻啞郎當山鳥山花間較殺相呼相喚笑人忙笑也任他笑忙也任我忙尉斗煎來銚不同下座送先和尚牌位進祖堂云盡力建法幢靈龜負圖隨機裂疑網寶劍傷鋒縱有攫霧攖雲之手總不似縮爪藏牙故我老人出則如杲日麗天歸則如羚羊挂角不但蹤迹無尋而且邈摸不得茲於歲當閼逢執徐令屬王春首旦依舊老人在素上座手裏既在不肖手裏冀我老人永坐高堂作兒孫之榜樣一燈不夜延佛祖之光明為甚如此是法住法位世間相常住遂安領衆大展九拜同門弟杜賜居士林超裴捐資助刻
